<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0a0e17;color:#e0e6f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.app{width:100%;max-width:400px;padding:20px;text-align:center}
h2{color:#a78bfa;font-size:1.1rem;margin-bottom:.5rem}
p{color:#6b7280;font-size:.75rem;margin-bottom:1rem}
.tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem}
.tabs button{padding:.3rem 1rem;border-radius:20px;border:none;font-weight:700;font-size:.8rem;cursor:pointer}
.tabs .on{background:#a78bfa;color:#fff}
.tabs .off{background:#1e2a3a;color:#6b7280}
.field{text-align:left;margin-bottom:.6rem}
.field label{display:block;font-size:.65rem;color:#6b7280;margin-bottom:.2rem;font-weight:600}
.field input,.field select{width:100%;padding:.4rem .6rem;border-radius:10px;border:1.5px solid #1e2a3a;background:#0d1520;color:#e0e6f0;font-size:.8rem;outline:none}
.field input:focus,.field select:focus{border-color:#a78bfa}
.btn{width:100%;padding:.5rem;border-radius:10px;border:none;background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;font-weight:700;cursor:pointer;margin-top:.2rem}
.err{color:#ef4444;font-size:.75rem;min-height:1rem;margin-bottom:.3rem}
.hidden{display:none}
.ok{color:#27ae60;font-size:.75rem}
</style>
</head>
<body>
<div class="app">
<div id="loginPage">
<h2>👨‍🏫 教师端</h2>
<div class="tabs">
<button class="on" id="tabLogin" onclick="switchTab('login')">登录</button>
<button class="off" id="tabReg" onclick="switchTab('reg')">注册</button>
</div>

<div id="loginForm">
<div class="field"><label>用户名</label><input type="text" id="lPhone" placeholder="设置用户名"></div>
<div class="field"><label>密码</label><input type="password" id="lPw" placeholder="密码"></div>
<div class="err" id="lErr"></div>
<button class="btn" onclick="doLogin()">登录</button>
</div>

<div id="regForm" class="hidden">
<div class="field"><label>用户名</label><input type="text" id="rPhone" placeholder="设置用户名"></div>
<div class="field"><label>密码（至少4位）</label><input type="password" id="rPw" placeholder="密码"></div>
<div class="field"><label>教师身份</label><select id="rType"><option value="班主任">班主任</option><option value="任课老师">任课老师</option></select></div>
<div class="field"><label>教师名称</label><input type="text" id="rName" placeholder="如：张老师"></div>
<div class="field"><label>班级名称</label><input type="text" id="rClass" placeholder="如：三年级一班"></div>
<div class="err" id="rErr"></div>
<button class="btn" onclick="doReg()">注册</button>
</div>
</div>

<div id="mainPage" class="hidden">
<p style="color:#a78bfa;font-weight:700">教师码：<span id="codeDisplay">—</span> <span style="font-size:.55rem;color:#6b7280" onclick="showConnect()">🔗 连接</span></p>
<button class="btn" style="background:transparent;border:1px solid #1e2a3a;margin-bottom:.3rem" onclick="copyCode()">📋 复制教师码</button>
<div id="connectPanel" class="hidden" style="margin-bottom:.5rem;padding:.4rem;background:#141b2d;border-radius:10px">
<div class="field"><label>输入教师码连接</label><input type="text" id="connectCode" placeholder="如TCH7A3B" style="text-transform:uppercase;font-family:monospace"></div>
<button class="btn" onclick="doConnect()" style="margin-bottom:.2rem">连接</button>
<div class="err" id="connectErr"></div>
</div>
<div id="classList" style="margin:.5rem 0"></div>
<div id="callHistory" style="background:#141b2d;border:1px solid #1e2a3a;border-radius:10px;padding:.4rem .6rem;margin-bottom:.5rem;font-size:.75rem;color:#6b7280"></div>
<div id="callPanel" style="background:#141b2d;border:1px solid #1e2a3a;border-radius:10px;padding:.5rem .6rem;margin-bottom:.5rem">
<p style="font-size:.7rem;color:#6b7280;margin-bottom:.3rem">📞 发送呼叫</p>
<input type="text" id="callNameInput" placeholder="学生姓名" style="width:100%;padding:.35rem .5rem;border-radius:8px;border:1.5px solid #1e2a3a;background:#0d1520;color:#e0e6f0;font-size:.8rem;outline:none;box-sizing:border-box">
<div style="display:flex;gap:.3rem;margin-top:.3rem">
<button class="btn" onclick="sendCall()" style="padding:.35rem;font-size:.75rem">呼叫</button>
<button class="btn" style="background:transparent;border:1px solid #1e2a3a;color:#6b7280;padding:.35rem;font-size:.75rem" onclick="clearCall()">清除</button>
</div>
<div id="callResult" style="font-size:.7rem;color:#6b7280;margin-top:.3rem"></div>
</div>
<div class="field"><input type="text" id="newClsName" placeholder="新班级名称"><button class="btn" onclick="addClass()" style="margin-top:.3rem">➕ 添加班级</button></div>
<button class="btn" style="background:transparent;border:1px solid #ef4444;color:#ef4444;margin-top:.5rem" onclick="logout()">退出登录</button>
</div>
</div>

<script>
// ===== 修复：改为相对路径，兼容子域名和主域名部署 =====
// ===== 🔒 安全修复 =====
// 1. HTML 转义防 XSS
// 2. 密码 SHA-256 哈希，不存明文
// 3. 每个账号独立存储（前缀 'acc:' + 手机号）
// 4. 所有用户输入渲染都经过转义
var API = '/api/call';
var AUTH_API = '/api/auth';
var ACC_PREFIX = 'acc:';  // 每个账号独立key，如 acc:138xxxx

// HTML 转义：防止 XSS
function esc(str){
  if(typeof str !== 'string') str = String(str);
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// 简单的 SHA-256 哈希（从 Web Crypto API）
async function hashPw(pw){
  var enc = new TextEncoder().encode(pw);
  var buf = await crypto.subtle.digest('SHA-256', enc);
  var arr = Array.from(new Uint8Array(buf));
  return arr.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

function switchTab(t){
  document.getElementById('tabLogin').className = t==='login'?'on':'off';
  document.getElementById('tabReg').className = t==='reg'?'on':'off';
  document.getElementById('loginForm').style.display = t==='login'?'block':'none';
  document.getElementById('regForm').style.display = t==='reg'?'block':'none';
}

// 获取单个账号（返回 null 或账号对象）
function getAccount(phone){
  try {
    var raw = localStorage.getItem(ACC_PREFIX + phone);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// 保存单个账号
function saveAccount(phone, data){
  localStorage.setItem(ACC_PREFIX + phone, JSON.stringify(data));
}

// 删除单个账号
function removeAccount(phone){
  localStorage.removeItem(ACC_PREFIX + phone);
}

// ===== 注册（带密码哈希） =====
async function doReg(){
  var p=document.getElementById('rPhone').value.trim();
  var w=document.getElementById('rPw').value;
  var t=document.getElementById('rType').value;
  var n=document.getElementById('rName').value.trim();
  var c=document.getElementById('rClass').value.trim();
  if(p.length<2){document.getElementById('rErr').textContent='用户名无效';return;}
  if(w.length<4){document.getElementById('rErr').textContent='密码至少4位';return;}
  if(!n||!c){document.getElementById('rErr').textContent='请填写完整';return;}

  // 过滤特殊字符防止 key 冲突
  if(!/^[a-zA-Z0-9_@.\-]+$/.test(p)){
    document.getElementById('rErr').textContent='用户名只能包含字母、数字、下划线、@、.、-';
    return;
  }

  var existing = getAccount(p);
  if(existing){
    document.getElementById('rErr').textContent='该用户名已注册';
    return;
  }

  var pwHash = await hashPw(w);
  var teacherCode = 'TCH' + Math.random().toString(36).slice(2, 7).toUpperCase();
  var teacherData = {
    phone: p,
    pwHash: pwHash,  // 🔒 不存明文密码
    teacherCode: teacherCode,
    teacherName: n,
    teacherType: t,
    classes: [{ id: Date.now() + 'a', name: c, teacherType: t }]
  };

  // 每个账号独立存储
  saveAccount(p, teacherData);

  // 当前登录 session
  localStorage.setItem('***', teacherCode);
  localStorage.setItem('***', JSON.stringify({
    teacherCode: teacherCode,
    teacherName: n,
    teacherType: t,
    classes: teacherData.classes
  }));

  location.reload();
}

// ===== 登录（验证密码哈希） =====
async function doLogin(){
  var p=document.getElementById('lPhone').value.trim();
  var w=document.getElementById('lPw').value;
  if(!p||!w){document.getElementById('lErr').textContent='请填写完整';return;}

  var userData = getAccount(p);
  if(!userData){
    document.getElementById('lErr').textContent='账号不存在';
    return;
  }

  var pwHash = await hashPw(w);
  if(userData.pwHash !== pwHash){
    document.getElementById('lErr').textContent='密码错误';
    return;
  }

  localStorage.setItem('***', userData.teacherCode);
  localStorage.setItem('***', JSON.stringify({
    teacherCode: userData.teacherCode,
    teacherName: userData.teacherName,
    teacherType: userData.teacherType,
    classes: userData.classes || []
  }));

  location.reload();
}

function copyCode(){
  var code=document.getElementById('codeDisplay').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(code);}
  else alert(code);
}

function addClass(){
  var n=document.getElementById('newClsName').value.trim();
  if(!n) return;
  var raw=localStorage.getItem('***')||'null';
  var data=JSON.parse(raw);
  if(!data||!data.classes) return;
  data.classes.push({id:Date.now()+'a',name:n,teacherType:data.teacherType||'班主任'});
  localStorage.setItem('***',JSON.stringify(data));
  location.reload();
}

function sendCall(){
  var n=document.getElementById('callNameInput').value.trim();
  if(!n){document.getElementById('callResult').textContent='输入学生姓名';return;}
  var data=JSON.parse(localStorage.getItem('***')||'null');
  if(!data||!data.teacherCode){document.getElementById('callResult').textContent='未登录';return;}
  fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({_room:data.teacherCode,name:n,className:(data.classes&&data.classes[0]?data.classes[0].name:''),teacherName:data.teacherName||'教师'})})
    .then(function(r){return r.json();})
    .then(function(d){document.getElementById('callResult').textContent='✅ 已呼叫 '+n;document.getElementById('callNameInput').value='';})
    .catch(function(e){document.getElementById('callResult').textContent='网络错误';});
}

function clearCall(){
  var data=JSON.parse(localStorage.getItem('***')||'null');
  if(data&&data.teacherCode){
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({_room:data.teacherCode,_clear:true})}).catch(function(){});
  }
  document.getElementById('callResult').textContent='已清除';
}

function showConnect(){
  var el=document.getElementById('connectPanel');
  el.classList.toggle('hidden');
}

// ===== 通过教师码连接（扫描独立账号） =====
function doConnect(){
  var code=document.getElementById('connectCode').value.trim().toUpperCase();
  if(!code){document.getElementById('connectErr').textContent='输入教师码';return;}

  // 扫描所有 acc:* 前缀的 key
  var found = null;
  for(var i=0; i<localStorage.length; i++){
    var key = localStorage.key(i);
    if(key && key.startsWith(ACC_PREFIX)){
      try {
        var data = JSON.parse(localStorage.getItem(key));
        if(data && data.teacherCode === code){
          found = data;
          break;
        }
      } catch(e){}
    }
  }
  if(!found){
    document.getElementById('connectErr').textContent='未找到该教师';
    return;
  }
  document.getElementById('connectErr').textContent='✅ 已连接';
  localStorage.setItem('***',JSON.stringify({
    teacherCode: found.teacherCode,
    teacherName: found.teacherName,
    teacherType: found.teacherType,
    classes: found.classes || []
  }));
  location.reload();
}

function logout(){
  localStorage.removeItem('***');
  localStorage.removeItem('***');
  location.reload();
}

// 检查登录状态
var token=localStorage.getItem('***')||'';
var saved=localStorage.getItem('***')||'null';
var data=JSON.parse(saved);

if(data&&data.teacherCode){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('codeDisplay').textContent=data.teacherCode;
  var h='';
  if(data.classes){
    data.classes.forEach(function(c){
      var r=c.teacherType||data.teacherType||'班主任';
      h+='<div style="background:#141b2d;border:1px solid #1e2a3a;border-radius:10px;padding:.4rem .6rem;margin:.2rem 0;font-size:.8rem">';
      h+=esc(c.name)+' <span style="font-size:.6rem;color:#6b7280">('+esc(r)+')</span>';
      h+=' <a href="unified-v2.html" style="color:#a78bfa;font-size:.6rem;text-decoration:none;float:right">📊 管理</a>';
      h+='</div>';
    });
  }
  document.getElementById('classList').innerHTML=h;
}
</script>
</body>
</html>
