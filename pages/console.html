<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Bot Console</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;background:#0a0e17;color:#e0e6f0;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* 登录界面 */
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,#0f1a2e,#0a0e17);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .4s,transform .4s}
.login-screen.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
.login-box{background:#141b2d;border:1px solid #1e2a3a;border-radius:20px;padding:2rem 2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);width:340px;max-width:90vw;text-align:center}
.login-box .lock{font-size:2.5rem;margin-bottom:.5rem}
.login-box h2{font-size:1.1rem;font-weight:700;color:#e0e6f0;margin-bottom:.2rem}
.login-box .sub{font-size:.7rem;color:#6b7280;margin-bottom:1.2rem}
.login-box input{width:100%;padding:.6rem .8rem;border-radius:12px;border:1.5px solid #1e2a3a;background:#0d1520;color:#e0e6f0;font-size:.9rem;outline:none;text-align:center;letter-spacing:3px;font-family:monospace;margin-bottom:.6rem}
.login-box input:focus{border-color:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.15)}
.login-box .hint{font-size:.6rem;color:#6b7280;margin-top:.3rem}
.login-box .error{font-size:.65rem;color:#ef4444;margin-top:.4rem;min-height:1rem}
.login-box button{width:100%;padding:.55rem;border-radius:12px;border:none;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .12s;margin-top:.2rem}
.login-box button:hover{opacity:.9;transform:translateY(-1px)}
.login-box .attempts{font-size:.55rem;color:#6b7280;margin-top:.3rem}

/* 控制台 */
.console{width:100vw;height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity .5s}
.console.visible{opacity:1}
.topbar{background:linear-gradient(135deg,#0f1a2e,#141b2d);padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid #1e2a3a;flex-shrink:0}
.topbar .title{font-size:.9rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .badge{font-size:.55rem;color:#22c55e;background:rgba(34,197,94,.1);padding:.08rem .4rem;border-radius:30px;border:1px solid rgba(34,197,94,.2)}
.topbar .spacer{flex:1}
.topbar .time{font-size:.65rem;color:#6b7280;font-family:monospace}
.topbar .logout{font-size:.55rem;color:#6b7280;cursor:pointer;padding:.15rem .4rem;border-radius:6px;border:1px solid #1e2a3a;background:transparent;transition:all .1s}
.topbar .logout:hover{color:#ef4444;border-color:#ef4444}

.main{flex:1;display:flex;min-height:0}

/* 侧栏 */
.sidebar{flex:0 0 200px;background:#0d1520;border-right:1px solid #1e2a3a;padding:.5rem 0;overflow-y:auto}
.sidebar .s-item{padding:.4rem .8rem;font-size:.7rem;color:#6b7280;cursor:pointer;border-left:2px solid transparent;transition:all .08s;display:flex;align-items:center;gap:.4rem}
.sidebar .s-item:hover{color:#e0e6f0;background:rgba(96,165,250,.03)}
.sidebar .s-item.active{color:#60a5fa;border-left-color:#60a5fa;background:rgba(96,165,250,.06);font-weight:600}
.sidebar .s-item .s-icon{font-size:.75rem}

.content{flex:1;padding:.6rem;overflow-y:auto;display:flex;flex-direction:column;gap:.4rem}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:4px}

.section{display:none}
.section.active{display:block}
.section h3{font-size:.8rem;font-weight:700;color:#e0e6f0;margin-bottom:.4rem}
.section .desc{font-size:.6rem;color:#6b7280;margin-bottom:.6rem;line-height:1.6}

.card{background:#141b2d;border:1px solid #1e2a3a;border-radius:12px;padding:.6rem .8rem;margin-bottom:.4rem}
.card .c-title{font-size:.7rem;font-weight:600;color:#8899bb;margin-bottom:.3rem}
.card .c-body{font-size:.6rem;color:#6b7280;line-height:1.6}
.card .c-stat{display:flex;gap:.5rem;flex-wrap:wrap}
.card .c-stat .cs{font-size:.65rem;background:#0d1520;padding:.2rem .5rem;border-radius:8px;border:1px solid #1e2a3a}
.card .c-stat .cs .cs-n{font-size:1rem;font-weight:700;color:#60a5fa;display:block}
.card .c-stat .cs .cs-l{font-size:.5rem;color:#6b7280}
.card .c-code{background:#0d1520;border-radius:8px;padding:.4rem;font-family:monospace;font-size:.58rem;color:#8899bb;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}

.btn{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:8px;color:#fff;padding:.25rem .6rem;font-size:.6rem;font-weight:600;cursor:pointer;transition:all .08s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-sm{padding:.15rem .4rem;font-size:.55rem}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626)}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a)}
.btn-outline{background:transparent;border:1px solid #1e2a3a;color:#6b7280}

.row{display:flex;gap:.3rem;align-items:center;flex-wrap:wrap;margin-bottom:.2rem}
.row label{font-size:.6rem;color:#8899bb;min-width:60px}
.row input,.row select{flex:1;background:#0d1520;border:1.5px solid #1e2a3a;border-radius:6px;padding:.25rem .4rem;color:#e0e6f0;font-size:.6rem;outline:none;min-width:0}
.row input:focus{border-color:#60a5fa}

.log-area{background:#0d1520;border-radius:8px;padding:.4rem;font-family:monospace;font-size:.55rem;color:#6b7280;max-height:300px;overflow-y:auto;line-height:1.6}
.log-area .l-info{color:#60a5fa}
.log-area .l-ok{color:#22c55e}
.log-area .l-err{color:#ef4444}
.log-area .l-warn{color:#f59e0b}
.log-area .l-time{color:#6b7280}

@media(max-width:600px){
.sidebar{flex:0 0 140px}
.sidebar .s-item{font-size:.6rem;padding:.3rem .5rem}
}
</style>
</head>
<body>

<!-- 登录 -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
<div class="lock">🔐</div>
<h2>Z-Bot Console</h2>
<div class="sub">权限验证 · 仅限管理员</div>
<input type="password" id="pwdInput" placeholder="输入密码" maxlength="20" autocomplete="off">
<div class="error" id="loginError"></div>
<button id="loginBtn">验证身份</button>
<div class="attempts" id="attemptDisplay"></div>
<div class="hint">⏎ Enter 确认</div>
</div>
</div>

<!-- 控制台 -->
<div class="console" id="console">
<div class="topbar">
<div class="title">⚡ Z-Bot Console</div>
<div class="badge">🟢 已认证</div>
<div class="spacer"></div>
<div class="time" id="consoleTime"></div>
<button class="logout" id="logoutBtn">退出</button>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="content" id="content"></div>
</div>
</div>

<script>
(function(){
// ===== 配置 =====
var PASSWORD = 'Zez130923';
var MAX_ATTEMPTS = 5;
var attempts = 0;
var locked = false;
var lockoutTime = null;
var LOCKOUT_DURATION = 30000; // 30s

// ===== DOM =====
var loginScreen = document.getElementById('loginScreen');
var pwdInput = document.getElementById('pwdInput');
var loginBtn = document.getElementById('loginBtn');
var loginError = document.getElementById('loginError');
var attemptDisplay = document.getElementById('attemptDisplay');
var consoleEl = document.getElementById('console');
var sidebar = document.getElementById('sidebar');
var content = document.getElementById('content');
var logoutBtn = document.getElementById('logoutBtn');
var consoleTime = document.getElementById('consoleTime');

// ===== 时钟 =====
function clock(){
var d=new Date();
consoleTime.textContent=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
}
setInterval(clock,1000);clock();

// ===== 登录 =====
function doLogin(){
if(locked){
var remaining = Math.max(0, Math.ceil((LOCKOUT_DURATION - (Date.now() - lockoutTime)) / 1000));
loginError.textContent = '⛔ 锁定中，请等待 ' + remaining + ' 秒';
return;
}
var pwd = pwdInput.value.trim();
if(!pwd){loginError.textContent='请输入密码';return;}

if(pwd === PASSWORD){
loginScreen.classList.add('hidden');
consoleEl.classList.add('visible');
initConsole();
return;
}

attempts++;
var left = MAX_ATTEMPTS - attempts;
loginError.textContent = '❌ 密码错误，还剩 ' + left + ' 次机会';
pwdInput.value = '';
pwdInput.focus();

if(attempts >= MAX_ATTEMPTS){
locked = true;
lockoutTime = Date.now();
loginError.textContent = '⛔ 尝试过多，锁定 30 秒';
setTimeout(function(){
locked = false;
attempts = 0;
loginError.textContent = '';
pwdInput.value = '';
pwdInput.focus();
}, LOCKOUT_DURATION);
}
}

loginBtn.onclick = doLogin;
pwdInput.onkeydown = function(e){
if(e.key === 'Enter') doLogin();
if(e.key === 'Escape'){pwdInput.blur();}
};
// 自动聚焦
setTimeout(function(){pwdInput.focus();}, 300);

// ===== 退出 =====
logoutBtn.onclick = function(){
if(!confirm('确认退出控制台？')) return;
if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null;}
consoleEl.classList.remove('visible');
loginScreen.classList.remove('hidden');
pwdInput.value = '';
pwdInput.focus();
};

// ===== 控制台 =====
function initConsole(){
var sections = [
{id:'chat', icon:'💬', name:'AI 对话', html:genChat},
{id:'dashboard', icon:'📊', name:'仪表盘', html:genDashboard},
{id:'sites', icon:'🌐', name:'站点管理', html:genSites},
{id:'files', icon:'📁', name:'文件管理', html:genFiles},
{id:'api', icon:'🔌', name:'API 状态', html:genApiStatus},
{id:'logs', icon:'📋', name:'系统日志', html:genLogs},
{id:'config', icon:'⚙️', name:'系统配置', html:genConfig},
];

var sidebarHtml = '';
sections.forEach(function(s, i){
sidebarHtml += '<div class="s-item'+(i===0?' active':'')+'" data-section="'+s.id+'"><span class="s-icon">'+s.icon+'</span>'+s.name+'</div>';
});
sidebar.innerHTML = sidebarHtml;

sidebar.querySelectorAll('.s-item').forEach(function(item){
item.onclick = function(){
sidebar.querySelectorAll('.s-item').forEach(function(s){s.classList.remove('active');});
this.classList.add('active');
loadSection(this.getAttribute('data-section'));
};
});

// 加载首页
loadSection('chat');
}

function loadSection(id){
var section = sections.find(function(s){return s.id === id;});
if(!section) return;
// 停止上一个tab的轮询
if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null;}
content.innerHTML = '<div class="section active"><h3>'+section.icon+' '+section.name+'</h3><div class="desc"></div>'+section.html()+'</div>';
// 绑定事件
bindSectionEvents(id);
}

var sections = [
{id:'chat', icon:'💬', name:'AI 对话', html:genChat},
{id:'dashboard', icon:'📊', name:'仪表盘', html:genDashboard},
{id:'sites', icon:'🌐', name:'站点管理', html:genSites},
{id:'files', icon:'📁', name:'文件管理', html:genFiles},
{id:'api', icon:'🔌', name:'API 状态', html:genApiStatus},
{id:'logs', icon:'📋', name:'系统日志', html:genLogs},
{id:'config', icon:'⚙️', name:'系统配置', html:genConfig},
];

// ===== 聊天系统 =====
var chatHistory = JSON.parse(localStorage.getItem('zb_chat') || '[]');
var chatPollTimer = null;
var lastServerTime = 0;

function genChat(){
var html = '<div style="display:flex;flex-direction:column;height:calc(100vh - 130px)">';
html += '<div class="card" style="flex:1;overflow-y:auto;margin-bottom:0;display:flex;flex-direction:column">';
html += '<div class="c-title">💬 与零酱对话 <span style="font-weight:400;color:#6b7280;font-size:.48rem">AI每15秒检查新消息</span></div>';
html += '<div id="chatMessages" style="flex:1;overflow-y:auto;padding:.2rem 0;font-size:.65rem;line-height:1.6"></div>';
html += '</div>';
html += '<div class="row" style="margin-top:.2rem;flex-shrink:0"><input type="text" id="chatInput" placeholder="输入消息，按 Enter 发送..." style="flex:1"><button id="chatSendBtn" class="btn">发送</button><button id="chatClearBtn" class="btn btn-danger btn-sm">🗑️</button></div>';
html += '</div>';
return html;
}

function renderChat(){
var area = document.getElementById('chatMessages');
if(!area) return;
var html = '';
chatHistory.forEach(function(m){
var isUser = m.role === 'user';
html += '<div style="margin-bottom:.3rem;display:flex;'+(isUser?'justify-content:flex-end':'')+'">';
html += '<div style="max-width:85%;padding:.25rem .4rem;border-radius:8px;'+(isUser?'background:#1e2a3a;color:#e0e6f0':'background:rgba(96,165,250,.08);border-left:2px solid #60a5fa;color:#c8d8f0')+'">';
if(!isUser) html += '<div style="font-size:.48rem;color:#60a5fa;margin-bottom:.05rem">🤖 零酱</div>';
html += '<div style="white-space:pre-wrap;word-break:break-word">'+esc(m.text)+'</div>';
html += '<div style="font-size:.4rem;color:#6b7280;margin-top:.05rem">'+m.time+'</div>';
html += '</div></div>';
});
if(!chatHistory.length) html += '<div style="text-align:center;color:#6b7280;font-size:.55rem;padding:1rem">开始和零酱对话吧 👋</div>';
area.innerHTML = html;
area.scrollTop = area.scrollHeight;
}

function sendChatMessage(){
var input = document.getElementById('chatInput');
if(!input) return;
var text = input.value.trim();
if(!text) return;
input.value = '';
var d = new Date();
var ts = ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
chatHistory.push({role:'user', text:text, time:ts});
localStorage.setItem('zb_chat', JSON.stringify(chatHistory));
renderChat();

// Send to dedicated chat API
fetch('/api/chat', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({text:text, role:'user'})
}).catch(function(){});
}

function checkChatResponses(){
fetch('/api/chat?since='+lastServerTime).then(function(r){return r.json()}).then(function(d){
if(d.messages && d.messages.length){
lastServerTime = d.serverTime || Date.now();
var aiMsgs = d.messages.filter(function(m){ return m.role === 'ai'; });
var newReplies = false;
aiMsgs.forEach(function(msg){
var exists = chatHistory.some(function(m){ return m._id === msg.id; });
if(!exists){
var d2 = new Date(msg.ts);
var ts2 = ('0'+d2.getHours()).slice(-2)+':'+('0'+d2.getMinutes()).slice(-2)+':'+('0'+d2.getSeconds()).slice(-2);
chatHistory.push({role:'ai', text:msg.text, time:ts2, _id:msg.id});
newReplies = true;
}
});
if(newReplies){
localStorage.setItem('zb_chat', JSON.stringify(chatHistory));
renderChat();
}
}
}).catch(function(){});
}

function startChatPoll(){
if(chatPollTimer) clearInterval(chatPollTimer);
// First get server time
fetch('/api/chat').then(function(r){return r.json()}).then(function(d){
lastServerTime = d.serverTime || 0;
}).catch(function(){});
chatPollTimer = setInterval(checkChatResponses, 3000);
}

// ===== 事件绑定 =====
function bindSectionEvents(id){
if(id === 'chat'){
renderChat();
startChatPoll();
var sendBtn = document.getElementById('chatSendBtn');
var input = document.getElementById('chatInput');
if(sendBtn) sendBtn.onclick = sendChatMessage;
if(input) input.onkeydown = function(e){ if(e.key === 'Enter') sendChatMessage(); };
var clearBtn = document.getElementById('chatClearBtn');
if(clearBtn) clearBtn.onclick = function(){
if(!confirm('确认清空对话记录？')) return;
chatHistory = [];
localStorage.setItem('zb_chat', '[]');
renderChat();
};
}
if(id === 'api'){
window.testAPI = function(action){
var url = document.getElementById('apiTestUrl').value.trim();
if(!url) return;
var result = document.getElementById('apiTestResult');
result.innerHTML = '⏳ 请求中...';
fetch('/api/browser-proxy?url='+encodeURIComponent(url)+'&action='+action)
.then(function(r){return r.json()})
.then(function(d){
if(action === 'parse'){
result.innerHTML = '✅ 解析完成：<strong>'+d.title+'</strong>，共 '+d.totalElements+' 个元素<br>'+d.elements.slice(0,5).map(function(e){return '• '+e.type+': '+e.text.substring(0,30);}).join('<br>');
} else if(action === 'extract'){
result.innerHTML = '✅ 提取完成：<strong>'+d.title+'</strong>，共 '+d.length+' 字<br><span style="color:#8899bb">'+((d.text||'').substring(0,200))+'</span>';
} else if(action === 'summarize'){
result.innerHTML = '✅ 总结完成：<strong>'+d.title+'</strong><br>关键词：'+(d.keywords||[]).join(' · ')+'<br>摘要：<span style="color:#8899bb">'+((d.summary||'').substring(0,300))+'</span>';
}
})
.catch(function(err){result.innerHTML = '❌ 请求失败: '+err.message;});
};
}

if(id === 'logs'){
window.addLog = function(type,msg){
var area = document.getElementById('logArea');
if(!area) return;
var cls = {info:'l-info',ok:'l-ok',err:'l-err',warn:'l-warn'}[type]||'l-info';
var d = new Date();
var ts = ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
area.innerHTML += '\n<span class="'+cls+'">['+ts+'] ['+type.toUpperCase()+'] '+msg+'</span>';
area.scrollTop = area.scrollHeight;
};
var d = new Date();
addLog('info','控制台会话已建立');
addLog('ok','认证通过 - IP 已记录');
}
}

};
