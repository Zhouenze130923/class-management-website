#tcross::after{width:2px;height:16px;top:20px;left:19px}

/* 最小地图 */
#mm{border:1px solid rgba(255,255,255,.15)}</head><body>

// --- Binary Min-Heap (优先队列) ---
class MinHeap {
  constructor(){this.h=[]}
  get size(){return this.h.length}
  push(n){this.h.push(n);this._u(this.h.length-1)}
  pop(){
    if(!this.h.length)return null;
    const t=this.h[0],e=this.h.pop();
    if(this.h.length){this.h[0]=e;this._d(0)}
    return t;
  }
  _u(i){while(i>0){const p=(i-1)>>1;if(this.h[p].f<=this.h[i].f)break;[this.h[p],this.h[i]]=[this.h[i],this.h[p]];i=p}}
  _d(i){const n=this.h.length;while(1){let c=i,l=(i<<1)+1,r=l+1;if(l<n&&this.h[l].f<this.h[c].f)c=l;if(r<n&&this.h[r].f<this.h[c].f)c=r;if(c===i)break;[this.h[i],this.h[c]]=[this.h[c],this.h[i]];i=c}}
}

// --- 路径平滑（Funnel Algorithm / 漏斗算法简化版）---
function smoothPath(raw,start,end){
  if(!raw||raw.length<3)return raw;
  let path=[start];
  let i=0;
  while(i<raw.length-1){
    // 从当前点往后找，看能直走到哪个点
    let furthest=i+1;
    for(let j=i+2;j<raw.length;j++){
      if(lineOfSight(raw[i].x,raw[i].y,raw[j].x,raw[j].y)){
        furthest=j;
      }else break;
    }
    if(furthest>i+1){
      path.push(raw[furthest]);
      i=furthest;
    }else{
      path.push(raw[i+1]);
      i++;
    }
  }
  if(path[path.length-1]!==end)path.push(end);
  return path;
}

function inSmoke(x,y){
  const n=_();
  for(const ef of G.ef){
    if(ef.t==='smoke'&&n-ef.s<ef.d&&Math.hypot(x-ef.x,y-ef.y)<ef.r)return true;
    if(ef.t==='smokeLine'&&n-ef.s<ef.d){
      const dx=ef.x2-ef.x1,dy=ef.y2-ef.y1;
      const len2=dx*dx+dy*dy;
      if(len2===0)continue;
      let t=((x-ef.x1)*dx+(y-ef.y1)*dy)/len2;
      t=Math.max(0,Math.min(1,t));
      const cx=ef.x1+t*dx,cy=ef.y1+t*dy;
      if(Math.hypot(x-cx,y-cy)<ef.thick)return true;
    }
    // 宇宙裂变阻挡视线
    if(ef.t==='cosmicDivide'&&n-ef.s<ef.d){
      const dx=ef.x2-ef.x1,dy=ef.y2-ef.y1,len2=dx*dx+dy*dy,thick=ef.thick||20;
      if(len2===0){if(Math.hypot(x-ef.x1,y-ef.y1)<thick)return true}
      else{let t=((x-ef.x1)*dx+(y-ef.y1)*dy)/len2;t=Math.max(0,Math.min(1,t));const cx=ef.x1+t*dx,cy=ef.y1+t*dy;if(Math.hypot(x-cx,y-cy)<thick)return true}
    }
    // 海神线烟阻挡视线（路径轨迹多段检测）
    if(ef.t==='harborTide'&&n-ef.s<ef.d&&ef.hp>0&&ef.path){
      const pth=ef.path,thick=ef.thick||10;
      for(let pi=1;pi<pth.length;pi++){
        const p1=pth[pi-1],p2=pth[pi];
        const dx=p2.x-p1.x,dy=p2.y-p1.y;
        const len2=dx*dx+dy*dy;
        if(len2===0){if(Math.hypot(x-p1.x,y-p1.y)<thick)return true}
        else{
          let t=((x-p1.x)*dx+(y-p1.y)*dy)/len2;
          t=Math.max(0,Math.min(1,t));
          const cx=p1.x+t*dx,cy=p1.y+t*dy;
          if(Math.hypot(x-cx,y-cy)<thick)return true;
        }
      }
    }
  }
  return false;
}

// 海盾伤害吸收：如果目标在海盾内，伤害由海盾承担
function coveAbsorbDmg(o,dmg){
  for(const ef of G.ef){if(ef.t==='harborCove'&&ef.hp>0){
    const domeR=(ef.w||200)/2,cx=ef.x+domeR,cy=ef.y+domeR;
    if(d2({x:cx,y:cy},o)<domeR+30){
      const absorbed=Math.min(ef.hp,dmg);
      ef.hp-=absorbed;ef._lastHit=performance.now();
      spP(o.x,o.y,6,'#7dd3fc',3);
      return dmg-absorbed;
    }
  }}return dmg;
}

// 海盾技能阻挡：检查投射物是否被海盾挡住
function coveBlockProj(x,y,owner){
  for(const ef of G.ef){if(ef.t==='harborCove'&&ef.hp>0&&ef.owner!==owner){
    const domeR=(ef.w||200)/2,cx=ef.x+domeR,cy=ef.y+domeR;
    if(Math.hypot(x-cx,y-cy)<domeR){
      ef.hp=Math.max(0,ef.hp-20);ef._lastHit=performance.now();
      spP(x,y,10,'#7dd3fc',5);
      return true;
    }
  }}return false;
}

// 线烟阻挡投射物
function tideBlockProj(x,y){
  for(const ef of G.ef){if(ef.t==='harborTide'&&ef.hp>0&&ef.path&&ef.path.length>=2){
    const pth=ef.path,thick=ef.thick||10;
    for(let pi=1;pi<pth.length;pi++){
      const p1=pth[pi-1],p2=pth[pi];
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len2=dx*dx+dy*dy;
      if(len2===0){if(Math.hypot(x-p1.x,y-p1.y)<thick)return true}
      else{let t=((x-p1.x)*dx+(y-p1.y)*dy)/len2;t=Math.max(0,Math.min(1,t));
        if(Math.hypot(x-(p1.x+t*dx),y-(p1.y+t*dy))<thick)return true}
    }
  }}return false;
}

function lineOfSight(x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len=Math.ceil(Math.hypot(dx,dy)/5);
  // 检查连线是否穿过烟雾
  for(let i=0;i<=len;i++){
    const px=x1+dx*i/len,py=y1+dy*i/len;
    for(const w of WL){if(!w)continue;if(px>w[0]&&px<w[0]+w[2]&&py>w[1]&&py<w[1]+w[3])return false}
    if(inSmoke(px,py))return false;
  }
  return true;
}

// --- 墙体遮挡检测（掩体后的敌人不可见）---
function hasWallBetween(x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len=Math.ceil(Math.hypot(dx,dy)/3);
  for(let i=0;i<=len;i++){
    const px=x1+dx*i/len,py=y1+dy*i/len;
    for(const w of WL){if(!w)continue;if(px>w[0]&&px<w[0]+w[2]&&py>w[1]&&py<w[1]+w[3])return true}
  }
  return false;
}

// --- A* + JPS 混合寻路（带路径平滑）---
const PATH_CACHE=new Map();
const PCACHE_TTL=3000; // 3s cache

function findPath(sx,sy,ex,ey){
  const sc={c:~~(sx/CS),r:~~(sy/CS)},ec={c:~~(ex/CS),r:~~(ey/CS)};
  if(!gw(sc.c,sc.r)||!gw(ec.c,ec.r))return null;

  // 检查缓存
  const cacheKey=k_c(sc.c,sc.r)+'->'+k_c(ec.c,ec.r);
  const cached=PATH_CACHE.get(cacheKey);
  if(cached&&(_()-cached.t)<PCACHE_TTL)return cached.path;

  // 起点终点在同一格
  if(sc.c===ec.c&&sc.r===ec.r)return[{x:sx,y:sy},{x:ex,y:ey}];

  const heap=new MinHeap();
  const gScore=new Float32Array(GR*GC);
  const cameFrom=new Int32Array(GR*GC*2);
  const closed=new Uint8Array(GR*GC);
  const INF=1e9;

  for(let i=0;i<GR*GC;i++)gScore[i]=INF;
  const si=sc.r*GC+sc.c;
  gScore[si]=0;
  cameFrom[si*2]=-1;
  const h=Math.abs(sc.c-ec.c)+Math.abs(sc.r-ec.r);
  heap.push({c:sc.c,r:sc.r,g:0,f:h,id:si});

  let found=false;
  let iterations=0;
  const MAX_ITER=8000;

  while(heap.size&&iterations++<MAX_ITER){
    const cur=heap.pop();
    if(!cur)break;
    const ci=cur.r*GC+cur.c;
    if(closed[ci])continue;
    closed[ci]=1;

    // 到达终点
    if(cur.c===ec.c&&cur.r===ec.r){found=true;break;}

    const nbs=NEIGHBORS.get(k_c(cur.c,cur.r));
    if(!nbs)continue;

    for(const nb of nbs){
      const ni=nb.r*GC+nb.c;
      if(closed[ni])continue;
      const cost=(nb.dc&&nb.dr?1.414:1);
      const ng=(gScore[ci]||0)+cost;
      if(ng<gScore[ni]){
        gScore[ni]=ng;
        cameFrom[ni*2]=cur.c;
        cameFrom[ni*2+1]=cur.r;
        const f=ng+Math.abs(nb.c-ec.c)+Math.abs(nb.r-ec.r);
        heap.push({c:nb.c,r:nb.r,g:ng,f,id:ni});
      }
    }
  }

  if(!found){
    // 缓存空结果避免重复搜索
    PATH_CACHE.set(cacheKey,{path:null,t:_()});
    return null;
  }

  // 重建路径（原始网格中心点）
  const rawPath=[];
  let cc=ec.c,cr=ec.r;
  while(cc>=0&&cr>=0){
    rawPath.unshift({x:cc*CS+CS/2,y:cr*CS+CS/2});
    const ci=cr*GC+cc;
    const pc=cameFrom[ci*2],pr=cameFrom[ci*2+1];
    cc=pc;cr=pr;
  }

  // 路径平滑
  const startPoint={x:sx,y:sy};
  const endPoint={x:ex,y:ey};
  const smoothed=smoothPath(rawPath,startPoint,endPoint);

  // 缓存结果
  PATH_CACHE.set(cacheKey,{path:smoothed,t:_()});

  // 限制缓存大小
  if(PATH_CACHE.size>200){
    const oldest=[...PATH_CACHE.entries()].sort((a,b)=>a[1].t-b[1].t)[0];
    if(oldest)PATH_CACHE.delete(oldest[0]);
  }

  return smoothed;
}

// --- 威胁地图（实时计算敌方火力覆盖区）---
function buildThreatMap(entities){
  // 返回一个函数: (x,y) => threatLevel (0-1)
  return function(x,y){
    let threat=0;
    for(const e of entities){
      if(!e.al)continue;
      const d=Math.hypot(x-e.x,y-e.y);
      if(d<400&&lineOfSight(e.x,e.y,x,y)){
        // 越近威胁越高
        threat=Math.max(threat,1-d/400);
      }
    }
    return Math.min(1,threat);
  };
}

      {x:2450,y:650},{x:2690,y:680},{x:2890,y:750},{x:2500,y:800},{x:2850,y:880},{x:2700,y:870},

      {x:1550,y:600},{x:1550,y:1200},{x:1550,y:1500},{x:1550,y:2000},

function colCircle(e1,r1,e2,r2){
  const d=d2(e1,e2);
  if(d>=r1+r2)return false;

  return true;
}

    case'dash':e.x=cp(e.x+Math.cos(ag)*120,20,WW-20);e.y=cp(e.y+Math.sin(ag)*120,20,WH-20);col(e,e.r);spP(e.x,e.y,10,'#ef4444',4);break;

      e.y=cp(e.y+Math.sin(ang)*dist,20,WH-20);

      spP(e.x,e.y,30,'#6366f1',8);

    // ─── 尚伯乐专属：闪转（传送锚点） ───
    case'chamberRecall':{

        const ax=e._anchor.x, ay=e._anchor.y;
        spP(e.x,e.y,20,'#f59e0b',6);
        e.x=ax; e.y=ay;
        spP(e.x,e.y,20,'#f59e0b',6);
        col(e,e.r);
      }else{
        // 放置锚点
        e._anchor={x:e.x,y:e.y,set:true};

    case'razeDrone':{

      const angle=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      G.pr.push({x:e.x,y:e.y,vx:Math.cos(angle)*4,vy:Math.sin(angle)*4,life:350,t:'razeDrone',team:e.tm,att:20,owner:e});
      spP(e.x,e.y,12,'#f97316',5);
      break;
    }
    // ─── 雷兹专属：彩雷飞溅（集束手雷） ───
    case'razeCluster':{
      G.ef.push({t:'razeCluster',x:tx,y:ty,s:n,d:300,r:120,ip:e});
      spP(tx,ty,20,'#ef4444',6);
      emitSound(tx,ty,400,e.tm,'grenade');
      break;
    }
    // ─── 雷兹专属：爆破包 ───
    case'razeSatchel':{
      if(!e._satchel){
        // 放置爆破包
        const sx=cp(e.x+Math.cos(ag)*30,20,WW-20);
        const sy=cp(e.y+Math.sin(ag)*30,20,WH-20);
        e._satchel={x:sx,y:sy,s:n};
        spP(sx,sy,15,'#f97316',4);
        if(e===G.pl)$('st').innerHTML='<sub>💣 爆破包已放置，再按C引爆</sub>';
      }else{
        // 引爆爆破包
        const pack=e._satchel;
        G.ef.push({t:'explosion',x:pack.x,y:pack.y,s:n,d:300,r:130,ip:e,damage:70});
        spP(pack.x,pack.y,40,'#f97316',10);
        // 击飞效果：将范围内的实体推开
        const nearby=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&d2(o,pack)<130);
        nearby.forEach(o=>{
          const ang=Math.atan2(o.y-pack.y,o.x-pack.x);
          o.x+=Math.cos(ang)*60; o.y+=Math.sin(ang)*60;
          o.hp=Math.max(0,o.hp-70);
          if(o===e)o.hp=Math.max(0,o.hp+70); // Raze自伤免疫
        });
        emitSound(pack.x,pack.y,500,e.tm,'explosion');
        e._satchel=null;
        if(e===G.pl)$('st').innerHTML='';
      }
      break;
    }
    // ─── 霓虹专属：加速道 ───
    case'neonWall':{
      // 两道向前延伸的能量线→静电墙
      const aimAngle=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      const perpX=-Math.sin(aimAngle),perpY=Math.cos(aimAngle);
      for(let side=-1;side<=1;side+=2){
        const startX=e.x+perpX*side*45+Math.cos(aimAngle)*45;

        for(let j=0;j<10;j++){
          const segX=cp(startX+Math.cos(aimAngle)*j*30,20,WW-20);
          const segY=cp(startY+Math.sin(aimAngle)*j*30,20,WH-20);

        }
      }
      spP(e.x,e.y,25,'#38bdf8',8);
      emitSound(e.x,e.y,350,e.tm,'shock');
      break;
    }
    // ─── 壹决专属：凝聚护盾 ───
    case'isoShield':{

      const aimAngle=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      const sx=cp(e.x+Math.cos(aimAngle)*90,20,WW-20);
      const sy=cp(e.y+Math.sin(aimAngle)*90,20,WH-20);
      const perpX=-Math.sin(aimAngle),perpY=Math.cos(aimAngle);
      G.ef.push({t:'isoShield',x:sx-35,y:sy-70,w:70,h:140,s:n,d:4000,ag:aimAngle,owner:e});
      spP(sx,sy,25,'#fbbf24',8);
      break;
    }
    // ═══ 保持向后兼容的旧技能 ═══
    case'smokeWall':{
      const aimAngle=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      const startDist=30;
      e._smokeWall={t:n,lastX:e.x+Math.cos(aimAngle)*startDist,lastY:e.y+Math.sin(aimAngle)*startDist,cnt:0,max:50,dir:aimAngle};
      spP(e.x,e.y,10,'#94a3b8',3);
      if(e===G.pl)$('st').innerHTML='<sub>🌫️ 烟墙延伸中... 对准方向等2秒</sub>';
      break;
    }
    case'freeze':{
      G.ef.push({t:'freeze',x:tx,y:ty,s:n,d:3000,r:150});
      spP(tx,ty,25,'#38bdf8',6);
      const frozen=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&o!==e&&d2({x:tx,y:ty},o)<150);
      frozen.forEach(o=>{o._stun=Math.max(o._stun||0,n+1800);o.hp=Math.max(0,o.hp-25);spP(o.x,o.y,6,'#7dd3fc',3)});
      for(let i=0;i<10;i++){const a=Math.random()*6.28;G.pt.push({x:tx+Math.cos(a)*Math.random()*150,y:ty+Math.sin(a)*Math.random()*150,vx:Math.cos(a)*(1+Math.random()),vy:Math.sin(a)*(1+Math.random()),l:20,mx:35,r:2+Math.random()*3,c:'#bae6fd'})}
      break;
    }
    case'magnet':{
      G.ef.push({t:'magnet',x:tx,y:ty,s:n,d:2500,r:300});
      spP(tx,ty,25,'#8b5cf6',6);
      for(let i=0;i<15;i++){const a=Math.random()*6.28;G.pt.push({x:tx+Math.cos(a)*280,y:ty+Math.sin(a)*280,vx:-Math.cos(a)*5,vy:-Math.sin(a)*5,l:25,mx:35,r:2+Math.random()*3,c:'#a78bfa'})}
      break;
    }
    case'push':{
      G.ef.push({t:'push',x:e.x,y:e.y,s:n,d:500,r:180,ag:e.ag});
      spP(e.x,e.y,30,'#06b6d4',6);
      for(let i=0;i<8;i++){const a=e.ag+(Math.random()-.5)*2;G.pt.push({x:e.x+Math.cos(a)*10,y:e.y+Math.sin(a)*10,vx:Math.cos(a)*6,vy:Math.sin(a)*6,l:15,mx:25,r:2+Math.random()*3,c:'#38bdf8'})}
      break;
    }
  }
}

function useUlt(e){
  const n=_(),tp=e.tp;
  const enemies=e.tm==='fr'?G.en:[G.pl,...G.fr];
  const allies=e.tm==='fr'?[e,...G.fr]:[e,...G.en];
  const ult=UL[tp];
  if(!ult)return;
  
  switch(tp){
    // ─── 幻棱：涅槃重生 ───
    case'phoenix':{
      // 标记重生位置，回复生命
      e._phoenixRunBack={x:e.x,y:e.y,s:n};
      spP(e.x,e.y,40,'#f97316',10);
      e.hp=e.mx;
      emitSound(e.x,e.y,500,e.tm,'ult');
      e._ult=0;
      break;
    }
    // ─── 捷风：飓刃 ───
    case'jett':{
      // 装备飞刀：5把，右键散射，击杀重置
      e._jettKnives={count:5,active:true};
      e.am=GN[e.gi].m;
      spP(e.x,e.y,30,'#87ceeb',8);
      if(e===G.pl)$('st').innerHTML='<sub>🗡️ 飓刃激活! 左键投掷·右键散射·击杀重置</sub>';
      break;
    }
    // ─── 星礈：宇宙裂变（细线） ───
    case'astra':{
      // 朝前发射一条细线，阻挡视线与子弹
      const angle=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      const dist=900,startDist=30;
      const sx=cp(e.x+Math.cos(angle)*startDist,20,WW-20);
      const sy=cp(e.y+Math.sin(angle)*startDist,20,WH-20);
      const ex=cp(sx+Math.cos(angle)*dist,20,WW-20);
      const ey=cp(sy+Math.sin(angle)*dist,20,WH-20);
      G.ef.push({t:'cosmicDivide',x1:sx,y1:sy,x2:ex,y2:ey,thick:20,s:n,d:10000});
      spP(e.x,e.y,40,'#8b5cf6',12);
      // 星尘粒子沿路径
      for(let i=0;i<15;i++){const t=Math.random();G.pt.push({x:sx+(ex-sx)*t+Math.random()*60-30,y:sy+(ey-sy)*t+Math.random()*60-30,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,l:30,mx:50,r:2+Math.random()*3,c:'#c4b5fd'})}
      break;
    }
    // ─── 海神：怒涛 ───
    case'harbor':{
      // 怒涛：移动巨浪 ─ 释放时海神加速50%，真正缴械+清除技能
      const ultAngle=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      e._harborUlt={t:n,dir:ultAngle,lastX:e.x,lastY:e.y,cnt:0,hitSet:new Set(),_lastEfClear:0};
      e._rally=n+6000;
      spP(e.x,e.y,60,'#06b6d4',20);
      emitSound(e.x,e.y,600,e.tm,'ult');
      break;
    }
    // ─── 贤者：再起（复活最近阵亡的队友） ───
    case'sage':{
      // 找最近阵亡的友方单位
      const dead=allies.filter(o=>o!==e&&!o.al);
      if(dead.length>0){
        const target=dead.reduce((a,b)=>d2(e,a)<d2(e,b)?a:b);
        target.al=1; target.hp=Math.round(target.mx*0.5);
        target.x=e.x+20; target.y=e.y;
        spP(target.x,target.y,40,'#4ade80',15);
        emitSound(target.x,target.y,500,e.tm,'ult');
        G.kf.push({txt:'✨ 贤者复活了'+target.nm+'!',t:n});
      }
      break;
    }
    // ─── 猎枭：猎人之怒 ───
    case'sova':{
      // 三发穿墙能量箭
      for(let i=0;i<3;i++){
        const a=e.ag+(i-1)*0.2;
        G.bl.push({x:e.x,y:e.y,sx:e.x,sy:e.y,vx:Math.cos(a)*22,vy:Math.sin(a)*22,d:60,l:40,isE:e.tm==='en',r:6,tr:[],mr:1200,pierce:true});
      }
      spP(e.x,e.y,30,'#06b6d4',8);
      break;
    }
    // ─── 瑞纳：女皇旨令 ───
    case'reyna':{
      e._berserk=n+6000;
      e.am=GN[e.gi].m;
      // 击杀自动回血标记
      e._reynaEmpress=true;
      spP(e.x,e.y,35,'#c084fc',10);
      break;
    }
    // ─── 暮蝶：化蝶 ───
    case'clove':{
      // 立刻回复50HP+临时护盾，死后自动复活
      e.hp=Math.min(e.mx,e.hp+50);
      e._cloveBuff=n+8000;
      // 标记死亡位置用于复活
      e._cloveRevive=true;
      spP(e.x,e.y,35,'#a855f7',10);
      break;
    }
    // ─── 尚伯乐：孤高火力 ───
    case'chamber':{
      // 强化下一枪
      e._chamberUlt=true;
      e.am=GN[e.gi].m;
      spP(e.x,e.y,25,'#f59e0b',8);

      break;
    }
    // ─── 幽影：幽魂化生 ───
    case'omen':{

      spP(e.x,e.y,50,'#6366f1',15);
      break;
    }
    // ─── 雷兹：晚安焰火 ───
    case'raze':{
      // 发射火箭
      const rocketDir=e===G.pl?Math.atan2(ms.wy-e.y,ms.wx-e.x):e.ag;
      G.pr.push({x:e.x,y:e.y,vx:Math.cos(rocketDir)*12,vy:Math.sin(rocketDir)*12,life:60,t:'razeRocket',team:e.tm,att:100,owner:e});
      spP(e.x,e.y,40,'#f97316',10);
      emitSound(e.x,e.y,500,e.tm,'rocket');
      break;
    }
    // ─── 霓虹：超限暴走 ───
    case'neon':{
      e._berserk=n+5000;
      e.am=GN[e.gi].m;
      e._neonOverdrive=true;
      spP(e.x,e.y,35,'#38bdf8',12);
      break;
    }
    // ─── 壹决：猎杀空间 ───
    case'iso':{
      // 孤立最近的敌人进行对决
      let closest=null,bd=400;
      enemies.forEach(o=>{
        if(o.al){const d=d2(e,o);if(d<bd){bd=d;closest=o}}
      });
      if(closest){
        G.ef.push({t:'isoArena',x:(e.x+closest.x)/2,y:(e.y+closest.y)/2,s:n,d:7000,r:250,owner:e,target:closest});
        // 对决双方各回复75HP
        e.hp=Math.min(e.mx,e.hp+75);
        closest.hp=Math.min(closest.mx,closest.hp+75);
        spP(e.x,e.y,30,'#fbbf24',10);
        spP(closest.x,closest.y,30,'#ef4444',10);
      }else{
        spP(e.x,e.y,20,'#fbbf24',5);
      }
      break;
    }
    // ─── 旧版fallback ───
    default:{
      const ult=UL[tp];
      if(!ult)return;
      switch(ult.f){
        case'barrage':{
          for(let i=0;i<30;i++){
            const a=e.ag+(Math.random()-.5)*1.6;
            G.bl.push({x:e.x,y:e.y,sx:e.x,sy:e.y,vx:Math.cos(a)*18,vy:Math.sin(a)*18,d:15,l:30,isE:e.tm==='en',r:3,tr:[],mr:400});
          }
          spP(e.x,e.y,25,'#f97316',5);
          break;
        }
        case'gravity':{
          G.ef.push({t:'gravity',x:e.x,y:e.y,s:n,d:5000,r:250,ip:e});
          spP(e.x,e.y,30,'#8b5cf6',6);
          for(let i=0;i<20;i++){const a=Math.random()*6.28;G.pt.push({x:e.x+Math.cos(a)*230,y:e.y+Math.sin(a)*230,vx:-Math.cos(a)*5,vy:-Math.sin(a)*5,l:25,mx:35,r:2+Math.random()*3,c:'#a78bfa'})}
          break;
        }
        case'turtle':{
          e._turtle=n+4000;
          spP(e.x,e.y,30,'#22c55e',6);
          break;
        }
        case'berserk':{
          e._berserk=n+5000;
          e.am=GN[e.gi].m;
          spP(e.x,e.y,25,'#ef4444',5);
          for(let i=0;i<15;i++){const a=Math.random()*6.28;G.pt.push({x:e.x+Math.cos(a)*40,y:e.y+Math.sin(a)*40,vx:Math.cos(a)*4+Math.random()*2,vy:Math.sin(a)*4+Math.random()*2,l:15,mx:25,r:2+Math.random()*3,c:'#ef4444'})}
          break;
        }
        case'strike':{
          let target=null,bd=500;
          enemies.forEach(o=>{if(o.al){const d=d2(e,o);if(d<bd&&Math.abs(Math.atan2(o.y-e.y,o.x-e.x)-e.ag)<1){bd=d;target=o}}});
          const sx=target?target.x:e.x+Math.cos(e.ag)*250,sy=target?target.y:e.y+Math.sin(e.ag)*250;
          G.ef.push({t:'strike',x:sx,y:sy,s:n,d:400,r:80,ip:e});
          spP(sx,sy,20,'#8b5cf6',5);
          break;
        }
      }
    }
  }
  // 大招发动提示
  if(tp!=='phoenix'){  // Phoenix ult 是生存技，不造成威胁
    const ulNm=UL[tp]?UL[tp].n:'大招';
    enemies.forEach(o=>{if(o.al&&d2(e,o)<800){const msg=e.ip?'▶▶ '+ulNm+' ◀◀':'⚠️ 敌方'+ulNm+'!';spP(o.x,o.y,1,msg,0);o._ultAlert=n+1500}});
  }
  e._ult=0;
}

function spP(x,y,c,cl,sp){
  for(let i=0;i<c;i++){const a=Math.random()*6.28,s=Math.random()*sp+.5;G.pt.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:15+20*Math.random(),mx:35,r:1.5+2.5*Math.random(),c:cl})}
}

function sh(e){
  const n=_(),g=GN[e.gi];
  // 狂暴状态：无限弹药+双倍射速
  const berserk=e._berserk>n;
  const fireRate=berserk?g.rt*0.5:g.rt;
  if(!g||n-e.ls<fireRate||e.am<=0){if(berserk&&e.am<=0)e.am=GN[e.gi].m;return}
  e.ls=n;e.am--;
  if(berserk&&e.am<GN[e.gi].m)e.am=GN[e.gi].m;
  const p=g.p||1;
  // 枪声：狙击最响，手枪最轻
  const sndRange=g.n==='狙击枪'?550:g.n==='霰弹枪'?450:g.n==='步枪'?400:g.n==='轻机枪'?400:g.n==='冲锋枪'?350:300;
  emitSound(e.x,e.y,sndRange,e.tm,'shot_'+g.n);
  // isE: true=敌方子弹（可打玩家和队友）, false=己方子弹（可打敌人）
  // 玩家(ip=1, tm='fr') → isE=false
  // 队友(ip=0, tm='fr') → isE=false
  // 敌人(ip=0, tm='en') → isE=true
  const isE=e.tm==='en';
  for(let i=0;i<p;i++){
    const a=e.ag+(Math.random()-.5)*(e.ip?.04:.08)*2,spd=g.sp+(Math.random()-.5)*1.5;
    G.bl.push({x:e.x,y:e.y,sx:e.x,sy:e.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,d:g.d+(g.p?Math.random()*5-2|0:0),l:40+(g.n==='狙击枪'?20:0),isE,r:g.p?3:g.n==='狙击枪'?5:4,tr:[],mr:g.mr||600,owner:e});
  }
  e.vx=(e.vx||0)-Math.cos(e.ag)*(g.p?2.5:1.2);e.vy=(e.vy||0)-Math.sin(e.ag)*(g.p?2.5:1.2);
  spP(e.x,e.y,3,e.ip?'#fbbf24':'#ef4444',2);
  if(e.am<=0&&e.ip){e.rl=1;e.rs=n}
}

function eSh(e,t){
  const n=_();
  if(n-e._sc<(e.stb>n?200:500)||!t||!t.al)return;
  e._sc=n;
  // 致盲状态：枪口乱晃，精度极差
  const blind=n<e._blind;
  const d=d2(e,t);
  e.gi=d<150?4:d<350?1:2;
  e.am=GN[e.gi].m;
  e.ag=ag2(e,t)+(blind?(Math.random()-.5)*.8:0);
  sh(e);
}

function swG(i){const p=G.pl;if(!p||!p.al||i===p.gi)return;if(p._disarm>_()&&i!==0)return;p.gi=i;p.am=GN[i].m;p.rl=0;uI()}

// ═══════════════════════════════════════════════════════════════
//  ██ 智能AI系统 — 行为树
// ═══════════════════════════════════════════════════════════════

function aiUpdate(e,isEnemy){
  if(!e.al||G.st!=='playing')return;
  if(G.rnS==='prep'){
    // 防守方→包点；进攻方→推前但不进包点
    const isDefender=(G.team==='atk')?(e.tm==='en'):(e.tm==='fr');
    if(isDefender){
      e._sprint=1;
      const target=Math.random()<0.5?SA:SB;
      aiGoto(e,target.x+(Math.random()-.5)*80,target.y+(Math.random()-.5)*80,e.sp*1.2);
    }else{
      aiGoto(e,SP_ATK[0].x+(Math.random()-.5)*120,200+Math.random()*80,e.sp*0.6);
    }
    return;
  }
  // 读条中（埋弹/拆弹）→ 原地不动
  if(G.ch&&G.ch.e===e){e.ag+=0.02;return}
  const n=_(),dt=Math.min(n-(e._lsu||n),50)/1000;
  e._lsu=n;
  if(e._stun>n){e._sl=1;e._afk=0;return}
  e._sl=0;

  // 致盲状态：乱走、看不清
  if(n<e._blind){
    e.ag+=Math.sin(n*0.02+e._pi)*0.3;
    e.x+=Math.cos(e.ag)*(e.sp*0.3);
    e.y+=Math.sin(e.ag)*(e.sp*0.3);
    col(e,e.r);
    if(Math.random()<.05)sh(e);  // 随机开枪
    return;
  }

  // ═══ AI体力管理 ═══
  e._stamina=Math.min(e._staminaMax,Math.max(0,e._stamina));
  if(e._sprint){
    e._stamina=Math.max(0,e._stamina-dt*50);
    if(e._stamina<=0)e._sprint=0;
  }else{
    e._stamina=Math.min(e._staminaMax,e._stamina+dt*25);
  }

  // 滑铲超时处理
  if(e._slide&&e._slide.active){
    if(n-e._slide.t>450){
      e._slide=null;
      e._sprintLock=n+200;
    }else{
      const slideSpd=e.sp*e._slide.speed*(1-(n-e._slide.t)/450);
      e.x+=Math.cos(e._slide.dir)*slideSpd;
      e.y+=Math.sin(e._slide.dir)*slideSpd;
      col(e,e.r);
      if(Math.random()<.3)spP(e.x,e.y,1,'#cbd5e1',2);
    }
  }

  const allies=isEnemy?G.en:G.fr;
  const enemies=isEnemy?[G.pl,...G.fr]:G.en;
  const aliveAllies=allies.filter(a=>a.al);
  const aliveEnemies=enemies.filter(a=>a.al);

  // 威胁评估
  let nearestEnemy=null,nearestDist=800;
  for(const en of aliveEnemies){
    const d=d2(e,en);
    const isDefusing=G.ch&&G.ch.e===en;
    const canSee=isDefusing||lineOfSight(e.x,e.y,en.x,en.y);
    if(d<nearestDist&&canSee){
      nearestDist=d;nearestEnemy=en;
    }
  }

  // ═══ 声音感知（只响应敌方声音，不听自己的）═══
  if(!nearestEnemy){
    const enemyTeam=e.tm==='fr'?'en':'fr';
    const heard=G.sd.filter(s=>n-s.t<2000&&s.tm===enemyTeam&&s.tp!=='step'&&Math.hypot(e.x-s.x,e.y-s.y)<s.r).sort((a,b)=>d2(e,a)-d2(e,b))[0];
    if(heard){
      e._de=n;
      e._en=null;
      const targetX=heard.x+(Math.random()-.5)*40;
      const targetY=heard.y+(Math.random()-.5)*40;
      e._sprint=n>(e._lsn||0)?1:0;
      aiGoto(e,targetX,targetY,e._sprint?e.sp*1.5:e.sp*0.8);
      if(heard.tp==='plant_start'||heard.tp==='defuse_start'){
        const myTeam=isEnemy?G.en:G.fr;
        myTeam.forEach(a=>{if(a!==e&&a.al&&d2(e,a)<500){a._de=n;a._en=null}});
      }
      return;
    }
    // 脚步声只在前方近距离触发（更容易警觉）
    const footstep=G.sd.filter(s=>n-s.t<1000&&s.tm===enemyTeam&&s.tp==='step'&&Math.hypot(e.x-s.x,e.y-s.y)<s.r).sort((a,b)=>d2(e,a)-d2(e,b))[0];
    if(footstep&&d2(e,footstep)<180){
      const targetX=footstep.x+(Math.random()-.5)*30;
      const targetY=footstep.y+(Math.random()-.5)*30;
      aiGoto(e,targetX,targetY,e.sp*0.7);
      return;
    }
  }

  // 1️⃣ 战斗状态（发现敌人）
  if(nearestEnemy&&nearestDist<500){
    e._de=n;
    e._en=nearestEnemy;
    e.ag=ag2(e,nearestEnemy);

    // ═══ AI战斗移动：疾跑+滑铲 ═══
    e._sprint=0;
    if(nearestDist<80){
      // 贴脸 — 后退射击
      const retreatX=e.x-Math.cos(e.ag)*40;
      const retreatY=e.y-Math.sin(e.ag)*40;
      e.x=cp(retreatX,20,WW-20);e.y=cp(retreatY,20,WH-20);
    }else if(nearestDist>200&&e._stamina>0&&!e._slide&&n>e._slideCd){
      // 远距离 → 疾跑接近
      e._sprint=1;
      aiGoto(e,nearestEnemy.x,nearestEnemy.y,e.sp*2.0);
      colCircle(e,e.r,nearestEnemy,nearestEnemy.r);
      // 疾跑中接近敌人时偶尔滑铲入场
      if(nearestDist<350&&Math.random()<.02&&!e._slide&&n>e._slideCd){
        e._sprint=0;
        const dir=ag2(e,nearestEnemy);
        e._slide={t:n,dir,active:true,speed:3.5};emitSound(e.x,e.y,180,e.tm,'slide')
        spP(e.x,e.y,10,'#94a3b8',4);
      }
    }else if(nearestDist>120){
      // 中距离 → 小碎步瞄准
      const spFactor=e._stamina>120?0.8:0.6;
      aiGoto(e,nearestEnemy.x,nearestEnemy.y,e.sp*spFactor);
      colCircle(e,e.r,nearestEnemy,nearestEnemy.r);
    }

    // 射击
    eSh(e,nearestEnemy);
    // 智能技能使用
    aiUseSkills(e,nearestEnemy,nearestDist);
    // AI大招：低血量或多人混战时使用
    if(e._ult>=e._ultMax&&(e.hp<e.mx*0.4||aliveEnemies.length>=2)){e._ult=0;useUlt(e)}
    return;
  }

  // 2️⃣ 听见枪声（有敌人但不在视野内）
  if(e._en&&e._en.al&&n-e._de<3000&&!nearestEnemy){
    const lastKnown=e._en;
    const searchX=lastKnown.x+(Math.random()-0.5)*100;
    const searchY=lastKnown.y+(Math.random()-0.5)*100;
    e._sprint=e._stamina>60?1:0;
    aiGoto(e,searchX,searchY,e._sprint?e.sp*2.0:e.sp*0.9);
    return;
  }

  // 2️⃣.5️⃣ 队友阵亡→就近支援
  const teamName=isEnemy?'en':'fr';
  const nearestAlert=G._alerts
    .filter(a=>a.team===teamName&&n-a.t<5000)
    .sort((a,b)=>d2(e,a)-d2(e,b))[0];
  if(nearestAlert&&d2(e,nearestAlert)<500&&!G._alertsClosed){
    e._de=n;
    e._sprint=e._stamina>60&&d2(e,nearestAlert)>200?1:0;
    aiGoto(e,nearestAlert.x+(Math.random()-.5)*100,nearestAlert.y+(Math.random()-.5)*100,e._sprint?e.sp*2.0:e.sp*0.85);
    if(d2(e,nearestAlert)<60)G._alerts=G._alerts.filter(a=>a!==nearestAlert);
    return;
  }

  // 3️⃣ 战术移动阶段
  if(isEnemy){
    aiDefenderTactics(e,allies,enemies);
  }else{
    aiAttackerTactics(e,allies,enemies);
  }
}

// 进攻方战术
function aiAttackerTactics(e,allies,enemies){
  const n=_();
  const aliveAllies=allies.filter(a=>a.al).length;
  const lastAlive=aliveAllies<=1;

  // 优先捡炸弹
  if(G.bo&&!e._bomb&&!G.bomb){
    aiGoto(e,G.bo.x,G.bo.y,e.sp*0.9);
    if(d2(e,G.bo)<30&&!e._bomb){e._bomb=1;G.bo=null;spP(e.x,e.y,12,'#fbbf24',3)}
    return;
  }

  // 已埋弹 → 进点防守
  if(G.bomb){
    if(d2(e,G.bomb)>80)aiGoto(e,G.bomb.x+(Math.random()-.5)*60,G.bomb.y+(Math.random()-.5)*60,e.sp*0.6);
    else e.ag+=0.03;
    return;
  }

  // ── 支援玩家：如果玩家在附近交火，过去帮忙 ──
  const p=G.pl;
  if(p&&p.al&&!G.spec&&d2(e,p)<400){
    const pInCombat=p.hf>0||G.df>0;
    // 如果玩家正在打某个敌人或挨打，去帮
    if(pInCombat){
      const nearEnemy=enemies.filter(en=>en.al&&d2(en,p)<500).sort((a,b)=>d2(p,a)-d2(p,b))[0];
      if(nearEnemy){
        aiGoto(e,nearEnemy.x,nearEnemy.y,e.sp*0.8);
        eSh(e,nearEnemy);
        return;
      }
    }
  }

  // ── 分配进攻路线 ──
  if(!e._tactPos||e._tactPhase==='done'){
    const idx=(allies.indexOf(e)+G.rnd*7)%5;
    const route=TACTICS.getAttackRoute(idx);
    e._tactPos=route;
    e._tactPhase='approach';
  }

  // ── 推进逻辑 ──
  const target=e._tactPos.target||SA;
  const wp=e._tactPos.waypoint||{x:target.x,y:Math.min(target.y,500)};
  const atWP=e._tactPhase==='approach'&&d2(e,wp)<80;

  if(lastAlive||e._tactPhase==='entry'){
    // 最后的战士 / 已经进点阶段 → 冲刺冲点
    e._tactPhase='entry';
    e._sprint=lastAlive&&e._stamina>60?1:0;
    const ox=(allies.indexOf(e)%3-1)*50;
    const oy=(allies.indexOf(e)%2?30:-30);
    aiGoto(e,target.x+ox,target.y+oy,e._sprint?e.sp*1.8:e.sp*0.6);
  }else if(!atWP){
    // 走向包点门口（远处疾跑，近处慢走）
    const distToWp=d2(e,wp);
    e._sprint=distToWp>200&&e._stamina>120?1:0;
    aiGoto(e,wp.x,wp.y,e._sprint?e.sp*1.7:e.sp*0.7);
  }else{
    // 到门口了，进点
    e._tactPhase='entry';
    const ox=(allies.indexOf(e)%3-1)*50;
    const oy=(allies.indexOf(e)%2?30:-30);
    aiGoto(e,target.x+ox,target.y+oy,e.sp*0.5);
  }

  // 队友间距
  for(const ally of allies){
    if(ally===e||!ally.al)continue;
    if(d2(e,ally)<60){
      const a=ag2(ally,e);
      e.x+=Math.cos(a)*15;e.y+=Math.sin(a)*15;
    }
  }
}

// 防守方战术
function aiDefenderTactics(e,allies,enemies){
  const n=_();
  // 炸弹已埋 → 疾跑靠近拆弹
  if(G.bomb){
    e._sprint=d2(e,G.bomb)>300&&e._stamina>60?1:0;
    aiGoto(e,G.bomb.x+(Math.random()-.5)*40,G.bomb.y+(Math.random()-.5)*40,e._sprint?e.sp*1.8:e.sp*0.95);
    return;
  }

  // ── 感应到玩家靠近→主动迎击 ──
  const p=G.pl;
  if(p&&p.al&&!G.spec&&d2(e,p)<350&&lineOfSight(e.x,e.y,p.x,p.y)){
    e.ag=ag2(e,p);
    eSh(e,p);
    e._sprint=d2(e,p)>200&&e._stamina>60?1:0;
    aiGoto(e,p.x,p.y,e._sprint?e.sp*2.0:e.sp*0.7);
    return;
  }

  // ── 动态分配防守站位（每15秒重评+响应警报）──
  if(!e._tactPos||n%15000<50){
    const idx=allies.indexOf(e);
    // 看当前各个区域的防守人数
    const atA=allies.filter(a=>a.al&&a._tactPos&&a._tactPos.x<1000).length;
    const atB=allies.filter(a=>a.al&&a._tactPos&&a._tactPos.x>2200).length;
    // 最近有没有警报
    const recentAlert=G._alerts.filter(a=>n-a.t<8000)
      .sort((a,b)=>d2(e,a)-d2(e,b))[0];
    let pos;
    if(recentAlert){
      const nearA=d2(recentAlert,SA)<d2(recentAlert,SB);
      pos=nearA?{x:400+(Math.random()-.5)*200,y:700+(Math.random()-.5)*200,label:'告警→A'}
        :{x:2600+(Math.random()-.5)*200,y:700+(Math.random()-.5)*200,label:'告警→B'};
    }else if(atA<=1||(atA<=atB&&atA<2)){
      const ap=[{x:400,y:700},{x:350,y:1000},{x:1050,y:700},{x:400,y:1500}];
      pos=ap[idx%ap.length];
    }else if(atB<2){
      const bp=[{x:2600,y:700},{x:2850,y:1000},{x:2150,y:700},{x:2800,y:1500}];
      pos=bp[idx%bp.length];
    }else{
      const mp=[{x:1550,y:1200},{x:1550,y:1500},{x:1050,y:700},{x:2150,y:700}];
      pos=mp[idx%mp.length];
    }
    e._tactPos=pos;e._tactPhase='guard';
  }

  // 到点位后架枪扫视
  if(e._tactPos){
    const d=d2(e,e._tactPos);
    if(d>40){
      e._sprint=d>250&&e._stamina>120?1:0;
      aiGoto(e,e._tactPos.x,e._tactPos.y,e._sprint?e.sp*1.7:(d>200?e.sp*0.8:e.sp*0.5));
    }else{
      e.ag+=0.01+Math.sin(n*0.003)*0.015;
      if(n%3000<30){
        const angle=Math.random()*6.28;
        aiGoto(e,e._tactPos.x+Math.cos(angle)*40,e._tactPos.y+Math.sin(angle)*40,e.sp*0.2);
      }
    }
  }

  // 队友间距
  for(const ally of allies){
    if(ally===e||!ally.al)continue;
    if(d2(e,ally)<50){
      const a=ag2(ally,e);
      e.x+=Math.cos(a)*12;e.y+=Math.sin(a)*12;
    }
  }
}

// 核心移动函数（智能寻路 + 碰撞规避）
function aiGoto(e,tx,ty,speed){
  // 持枪移速修正
  const gIdx=e.gi||0;
  if(GN[gIdx]&&GN[gIdx].spd)speed*=GN[gIdx].spd;
  const n=_();
  // 减速效果
  if(e._slow&&n<e._slow)speed*=0.4;
  // 全队突袭加速
  if(e._rally>n)speed*=1.5;
  // AI脚步声
  if(n>(e._lsn||0)){e._lsn=n+500;emitSound(e.x,e.y,e._sprint?200:120,e.tm,'step')}
  const dist=d2(e,{x:tx,y:ty});

  if(dist<20){
    e._ph=null;e._pt=null;
    e.x+=clamp(tx-e.x,-speed,speed);
    e.y+=clamp(ty-e.y,-speed,speed);
    e.ag=ag2(e,{x:tx,y:ty});
    return;
  }

  // 直线可达就走直线
  if(dist<200&&lineOfSight(e.x,e.y,tx,ty)){
    e.ag=ag2(e,{x:tx,y:ty});
    const spd=Math.min(speed,dist);
    e.x+=Math.cos(e.ag)*spd;
    e.y+=Math.sin(e.ag)*spd;
    col(e,e.r);
    return;
  }

  // 否则用寻路
  if(!e._ph||e._pi>=e._ph.length||n%2000<50){
    const path=findPath(e.x,e.y,tx,ty);
    if(path&&path.length>1){
      e._ph=path;e._pi=1;
      e._pt=null;
    }else{
      e._ph=null;
      // 回退：直接走过去
      e._pt={x:tx,y:ty};
    }
  }

  if(e._ph&&e._ph.length>1&&e._pi<e._ph.length){
    const wp=e._ph[e._pi];
    const d=d2(e,wp);
    if(d<15||d2(e,{x:tx,y:ty})<20){
      e._pi++;
      if(e._pi>=e._ph.length){e._ph=null;return}
    }
    const nextWp=e._ph[e._pi];
    e.ag=ag2(e,nextWp);
    const spd=Math.min(speed,d2(e,nextWp));
    e.x+=Math.cos(e.ag)*spd;
    e.y+=Math.sin(e.ag)*spd;
    col(e,e.r);
    // 撞墙检测：位置没变→堵住→自动重寻路
    const moved=Math.abs(e.x-e._lastX)>1||Math.abs(e.y-e._lastY)>1;
    e._lastX=e.x;e._lastY=e.y;
    if(!moved){e._stuck=(e._stuck||0)+1}else{e._stuck=0}
    if(e._stuck>30){e._ph=null;e._stuck=0;const np=findPath(e.x,e.y,tx,ty);if(np&&np.length>1){e._ph=np;e._pi=1}}
  }else if(e._pt){
    e.ag=ag2(e,e._pt);
    e.x+=Math.cos(e.ag)*speed;
    e.y+=Math.sin(e.ag)*speed;
    col(e,e.r);
    // 撞墙检测
    const moved=Math.abs(e.x-e._lastX)>1||Math.abs(e.y-e._lastY)>1;
    e._lastX=e.x;e._lastY=e.y;
    if(!moved){e._stuck=(e._stuck||0)+1}else{e._stuck=0}
    if(e._stuck>30){e._pt={x:tx+(Math.random()-.5)*40,y:ty+(Math.random()-.5)*40};e._stuck=0}
    if(d2(e,e._pt)<15)e._pt=null;
  }
}

function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}

// 智能技能使用
function aiUseSkills(e,enemy,dist){
  const n=_();
  const myHpRatio=e.hp/e.mx;

  for(const sk of e.sk){
    if(n<sk.ce)continue;
    switch(sk.f){
      case'healSelf':
        if(myHpRatio<0.4){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'healOther':{
        const need=allyLow.find(a=>a!==e&&a.al&&a.hp/a.mx<0.5);
        if(need){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      }
      case'flash':
        if(dist<250&&Math.random()<0.4){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'shock':
        if(dist<200&&dist>50&&Math.random()<0.5){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'dash':
        if(dist>150&&dist<300&&Math.random()<0.3){sk.ce=n+sk.cd;aSk(e,sk.f);return}

      case'harborCascade':

      case'harborTide':

        break;
      case'reynaDevour':
        if(myHpRatio<0.7){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'reynaDismiss':
        if(dist<100&&myHpRatio<0.4){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'omenParanoia':
        if(dist<250&&Math.random()<0.35){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'omenStep':
        if(dist>100&&dist<300){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'chamberRecall':
        if(dist>200||myHpRatio<0.3){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'razeDrone':
        if(Math.random()<0.3){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;
      case'razeCluster':
        if(dist<250&&Math.random()<0.4){sk.ce=n+sk.cd;aSk(e,sk.f);return}
        break;

        if(dist<150&&Math.random()<0.2){sk.ce=n+sk.cd;aSk(e,sk.f);return}

function bn(t){
  const el=$('roundBanner');if(!el)return;
  el.innerHTML=t+'<sub>'+G.rnd+'/12</sub>';
  el.classList.add('show');clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

function eR(w,t){
  if(G.rnS==='ended')return;
  G.rnS='ended';G._rs=_();
  if(w==='atk'){G.sc+=100;bn('🔵 进攻胜利!<sub>'+t+'</sub>')}
  else{bn('🔴 防守胜利!<sub>'+t+'</sub>')}
  clearTimeout(G._rt);
  G._rt=setTimeout(()=>{
    G.rnd++;if(G.rnd>12){G.rnd=1;G.sc=0}
    G.team=G.rnd%2?'atk':'def';sR()
  },3000);
}

function sR(){
  G.rnS='active';G.bomb=null;G.bo=null;G.ch=null;G._rs=0;G._alerts=[];G.sd=[];G.bl=[];G.pt=[];G.ef=[];G.pr=[];
  const pp=G.team==='atk'?SP_A:SP_CT;
  // 复活玩家（清除死亡观战模式，保留AI对战模式）
  if(!G._aiSpectate){G.spec=0;G.specIdx=-1;$('specUI').classList.remove('show')}
  G.pl.al=1;G.pl.hp=G.pl.mx;
  G.pl.x=pp.x;G.pl.y=pp.y;G.pl._bomb=0;G.pl._blind=0;G.pl.rl=0;G.pl.am=GN[G.pl.gi].m;
  // 清除可能残留的英雄专属死亡/复活状态
  G.pl._dismiss=0;G.pl._cloveRevive=false;G.pl._cloveBuff=0;
  G.fr.forEach((f,i)=>{const sp=G.team==='atk'?SP_ATK[i+1]:SP_DEF[i];if(!sp)return;
    Object.assign(f,{x:sp.x,y:sp.y,hp:f.mx,al:1,_bomb:0,_blind:0,_ph:null,_pi:0,_pt:null,_de:0,_tg:null,_en:null,_tactPos:null,am:GN[f.gi].m,_dismiss:0,_cloveRevive:false,_cloveBuff:0})});
  G.en.forEach((e,i)=>{const sp=G.team==='atk'?SP_DEF[i]:SP_ATK[i];if(!sp)return;
    Object.assign(e,{x:sp.x,y:sp.y,hp:e.mx,al:1,_bomb:0,_blind:0,_ph:null,_pi:0,_pt:null,_de:0,_tg:null,_en:null,_tactPos:null,am:GN[e.gi].m,_dismiss:0,_cloveRevive:false,_cloveBuff:0})});
  // 炸弹出生在出生点
  G.bo={x:SP_A.x,y:SP_A.y+40};
  // 准备阶段 15秒
  G.rnS='prep';G._prepEnd=performance.now()+15000;G._prepWalls=[];
  bn('⏳ 准备阶段 15s');
  const prepBars=[
    // A走廊入口（封住进攻方左路）
    {x:775,y:400,w:10,h:280},
    // B走廊入口（封住进攻方右路）
    {x:2410,y:400,w:10,h:280},
    // 中路水平屏障（横跨整个走廊，封住中路的进攻路线）
    {x:1350,y:620,w:500,h:20},
    // A连接→A包点入口（防进攻方从A包点绕进连接）
    {x:785,y:720,w:10,h:90},
    // B连接→B包点入口（防进攻方从B包点绕进连接）
    {x:2400,y:720,w:10,h:90},
  ];
  const n=performance.now();
  prepBars.forEach(b=>{G._prepWalls.push({x:b.x,y:b.y,w:b.w,h:b.h})});
  G.ca={x:0,y:0};uI();
}

// ═══ 游戏更新 ═══════════════

function up(dt){
  if(G.st!=='playing')return;
  const p=G.pl;if(!p)return;
  const n=_();
  const alive=p.al;

  // ═══ 准备阶段 ═══
  if(G.rnS==='prep'){
    const remain=Math.max(0,(G._prepEnd-n)/1000);
    bn('⏳ 准备 '+remain.toFixed(1)+'s');
    if(remain<=0){
      G._prepWalls=[];
      G.ef=G.ef.filter(function(ef){return ef.t!=='barrier'||ef.s>G._prepEnd});
      G.rnS='active';
      G._roundEnd=n+90000;
      bn(G.team==='atk'?'🔵 进攻开始 1:30':'🔴 防守开始 1:30');
    }
    ms.cl=0;
  }
  

  // ── 观战模式（死亡后自动进入）──
  if(!alive&&!G.spec){G.spec=1;G.specIdx=0;$('specUI').classList.add('show');$('specSelect').onchange=()=>{G.specIdx=parseInt($('specSelect').value)||0}}
  if(alive){
    // 活着：玩家操控
    G.ca.x+=(p.x-W/2-G.ca.x)*.08;G.ca.y+=(p.y-H/2-G.ca.y)*.08;
    G.ca.x=cp(G.ca.x,0,WW-W);G.ca.y=cp(G.ca.y,0,WH-H);
    ms.wx=ms.x+G.ca.x;ms.wy=ms.y+G.ca.y;
    p.ag=Math.atan2(ms.wy-p.y,ms.wx-p.x);

    // ── 开始/取消设置炸弹读条 ──
    if(!G.ch&&G.team==='atk'&&!G.bomb&&G.rnS==='active'&&(k['f']||k[' '])&&p._bomb&&(d2(p,SA)<130||d2(p,SB)<130)){
      const s=d2(p,SA)<d2(p,SB)?SA:SB;
      G.ch={e:p,tp:'plant',x:s.x,y:s.y,t:n,du:3000,px:p.x,py:p.y,_chHp:p.hp};emitSound(s.x,s.y,320,p.tm,'plant_start')
    }
    if(!G.ch&&G.team==='def'&&G.bomb&&G.rnS==='active'&&k['d']&&d2(p,G.bomb)<15){
      G.ch={e:p,tp:'defuse',x:G.bomb.x,y:G.bomb.y,t:n,du:3000,px:p.x,py:p.y,_chHp:p.hp};emitSound(G.bomb.x,G.bomb.y,320,p.tm,'defuse_start')
    }
    // 读条中移动→取消（对比实际位置变化，不是按键状态）
    if(G.ch&&G.ch.e===p&&(Math.abs(p.x-G.ch.px)>2||Math.abs(p.y-G.ch.py)>2)){G.ch=null}

    // 换弹
    if(p.rl){const g=GN[p.gi];if(n-p.rs>=g.rl){p.am=g.m;p.rl=0}}
    // 读条中不能动
    if(!(G.ch&&G.ch.e===p)){
      let dx=0,dy=0;
      if(k['w'])dy=-1;if(k['s'])dy=1;if(k['a'])dx=-1;if(k['d'])dx=1;
      if(dx||dy){const l=Math.hypot(dx,dy);dx/=l;dy/=l}

      // ═══ 体力系统 ═══
      const isMoving=dx||dy;
      const shiftHeld=k['shift'];
      p._stamina=Math.min(p._staminaMax,Math.max(0,p._stamina));

      // ═══ 疾跑系统 ═══
      if(p._sprintLock>n){p._sprintLock=0;}
      p._sprint=0;
      // 疾跑条件：Shift+移动+体力>0+不在滑铲+冷却已过+不在锁定
      const canSprint=isMoving&&shiftHeld&&p._stamina>0&&!p._slide&&n>p._slideCd&&!p._sprintLock;
      if(canSprint)p._sprint=1

      // ═══ 滑铲系统 ═══
      // Shift+Ctrl+移动 → 滑铲（需要正在疾跑状态）
      if(isMoving&&k['enter']&&p._sprint&&!p._slide&&n>p._slideCd){
        p._slide={t:n,dir:Math.atan2(dy,dx),speed:3.5,active:true};
        p._sprint=0;
        spP(p.x,p.y,10,'#94a3b8',4);emitSound(p.x,p.y,180,p.tm,'slide')
      }
      // 滑铲更新
      if(p._slide&&p._slide.active){
        const slideElapsed=n-p._slide.t;
        if(slideElapsed>450){
          p._slide=null;
          p._sprintLock=n+200;  // 滑铲后短暂硬直
        }else{
          const slideSpd=p.sp*p._slide.speed*(1-slideElapsed/450);
          p.x+=Math.cos(p._slide.dir)*slideSpd;
          p.y+=Math.sin(p._slide.dir)*slideSpd;
          // 滑铲粒子特效
          if(Math.random()<.3)spP(p.x,p.y,1,'#cbd5e1',2);
        }
      }

      // 体力消耗/恢复
      if(p._sprint){
        p._stamina=Math.max(0,p._stamina-dt*0.05);  // 50/秒消耗
        if(p._stamina<=0)p._sprint=0;
      }else if(!p._slide||!p._slide.active){
        p._stamina=Math.min(p._staminaMax,p._stamina+dt*0.025);  // 25/秒恢复
      }

      // 应用速度（疾跑×2.0 + 持枪移速修正 + 减速 + 全队突袭）
      const gunSpd=GN[p.gi].spd||1;
      const slowMul=p._slow&&n<p._slow?0.4:1;
      const rallyMul=p._rally>n?1.5:1;
      const multi=(p._sprint?2.0:1)*gunSpd*slowMul*rallyMul;
      p.x+=dx*p.sp*multi;
      p.y+=dy*p.sp*multi;
      p.x=cp(p.x,p.r,WW-p.r);p.y=cp(p.y,p.r,WH-p.r);
      col(p,p.r);
      // 脚步声（移动时每300ms发出，疾跑声更大）
      if(dx||dy&&n>p._lsn){p._lsn=n+300;emitSound(p.x,p.y,p._sprint?200:120,p.tm,'step')}

      // 射击（疾跑不能开枪，滑铲可以）
      if(!p._sprint&&G.rnS!=='prep'){
        const g=GN[p.gi];
        if(ms.dn&&g.au)sh(p);
        if(ms.cl&&!g.au)sh(p);
      }
      ms.cl=0;
    }
  }else{
    // 死了：观战镜头跟随下拉选中的目标
    const ts=G._aiSpectate?[...G.fr,...G.en].filter(t=>t&&t.al):[G.pl,...G.fr].filter(t=>t&&t.al);
    const t=ts[Math.min(G.specIdx||0,ts.length-1)];
    if(t){G.ca.x+=(t.x-W/2-G.ca.x)*.08;G.ca.y+=(t.y-H/2-G.ca.y)*.08;
      G.ca.x=cp(G.ca.x,0,WW-W);G.ca.y=cp(G.ca.y,0,WH-H)}
  }

  // ── 炸弹拾取 ──
  if(G.bo&&!G.bomb){
    // 玩家靠近捡起（仅进攻方）
    if(G.team==='atk'&&alive&&d2(p,G.bo)<30&&!p._bomb){p._bomb=1;G.bo=null;spP(p.x,p.y,12,'#fbbf24',3)}
    // AI捡起
    const bombTeam=G.team==='atk'?[...G.fr]:[...G.en];
    for(const e of bombTeam){if(e.al&&!e._bomb&&d2(e,G.bo)<30){e._bomb=1;G.bo=null;spP(e.x,e.y,12,'#fbbf24',3);break}}
  }

  // ── 读条处理（埋弹/拆弹）──
  if(G.ch){
    const ch=G.ch;
    // 被打断条件：持有者死亡或血量下降
    if(!ch.e.al||ch.e.hp<ch._chHp){G.ch=null}
    else if(n-ch.t>=ch.du){
      // 读条完成
      if(ch.tp==='plant'){
        G.bomb={x:ch.x,y:ch.y,dt:n+45000};
        ch.e._bomb=0;
        spP(ch.x,ch.y,40,'#fbbf24',6);bn('💣 炸弹! 45s');
      }else{
        G.bomb=null;
        spP(ch.x,ch.y,30,'#4ade80',5);eR('def','拆弹');G.ch=null;return;
      }
      G.ch=null;
    }
  }

  // ── AI 自动埋弹读条（到达包点且持弹）──
  if(!G.bomb&&!G.ch&&G.rnS==='active'){
    const plantTeam=G.team==='atk'?G.fr:G.en;
    for(const a of plantTeam){
      if(!a.al||!a._bomb||d2(a,SA)>130&&d2(a,SB)>130)continue;
      const s=d2(a,SA)<d2(a,SB)?SA:SB;
      G.ch={e:a,tp:'plant',x:s.x,y:s.y,t:n,du:3000,_chHp:a.hp};break;
    }
  }
  // ── AI 自动拆弹读条 ──
  if(G.bomb&&!G.ch&&G.rnS==='active'){
    const defuseTeam=G.team==='def'?G.fr:G.en;
    for(const d of defuseTeam){
      if(!d.al||d2(d,G.bomb)>15)continue;
      G.ch={e:d,tp:'defuse',x:G.bomb.x,y:G.bomb.y,t:n,du:3000,_chHp:d.hp};break;
    }
  }

  // 回合时限（90秒）
  if(G.rnS==='active'&&G._roundEnd&&n>G._roundEnd){
    if(G.bomb){
      if(n>G.bomb.dt){G.bomb=null;G.bo=null;eR('atk','💥爆炸');return}
    }else{
      eR('def','⏰ 时间到');return
    }
  }

  // 炸弹计时（爆炸=进攻方永远胜）
  if(G.bomb&&n>G.bomb.dt){G.bomb=null;G.bo=null;eR('atk','💥爆炸');return}

  // 诊断日志（每1000帧输出一次状态）
  if(G._fc===undefined)G._fc=0;
  G._fc++;
  if(G._fc%600===0)console.log('DIAG:',{rnS:G.rnS,rs:G._rs,fc:G._fc,bomb:!!G.bomb,ch:!!G.ch,fr:G.fr.filter(f=>f.al).length,en:G.en.filter(e=>e.al).length,alive:G.pl.al});

  // ── AI更新（准备阶段也要跑，防守去包点、进攻推前）──
  G.en.forEach(e=>aiUpdate(e,true));
  G.fr.forEach(e=>aiUpdate(e,false));

  if(G.rnS!=='active'){uI();return}

  // 安全机制：如果上一轮结束超过10秒还没重启，强制重置
  if(G._rs&&n-G._rs>10000){console.warn('⚠️ 轮次卡死，强制重置');G._rs=0;sR()}

  // 安全机制：没有任何活人时强制结束轮次
  if(!alive&&!G.fr.some(f=>f.al)&&!G.en.some(e=>e.al)&&G.rnS==='active'){eR('atk','无人生还');return}

  // ── 定向烟墙：朝瞄准方向不断延伸 ──
  [G.pl,...G.fr,...G.en].filter(e=>e&&e.al&&e._smokeWall).forEach(e=>{
    const sw=e._smokeWall;
    // 玩家：每帧跟随鼠标刷新方向；AI：保持初始方向
    if(e===G.pl)sw.dir=Math.atan2(ms.wy-e.y,ms.wx-e.x);
    if(sw.cnt>=sw.max){e._smokeWall=null;if(e===G.pl)$('st').innerHTML='';return}
    // 每帧朝方向延伸一段
    const step=30;
    const nx=sw.lastX+Math.cos(sw.dir)*step;
    const ny=sw.lastY+Math.sin(sw.dir)*step;
    if(nx<20||nx>WW-20||ny<20||ny>WH-20){e._smokeWall=null;return}  // 碰墙结束
    sw.lastX=nx;sw.lastY=ny;sw.cnt++;
    G.ef.push({t:'smoke',x:nx,y:ny,s:n,d:5000,r:35});
    if(sw.cnt%4===0)spP(nx,ny,3,'#94a3b8',1);
  });

  // ── 海神潮汐/高幕推进 ──
  [G.pl,...G.fr,...G.en].filter(e=>e&&e.al&&e._harborWave).forEach(e=>{
    const hw=e._harborWave;
    if(e===G.pl)hw.dir=Math.atan2(ms.wy-e.y,ms.wx-e.x);
    if(hw.cnt>=hw.max){e._harborWave=null;if(e===G.pl)$('st').innerHTML='';return}
    const step=hw.type==='tide'?30:25;
    const nx=hw.lastX+Math.cos(hw.dir)*step;
    const ny=hw.lastY+Math.sin(hw.dir)*step;
    if(nx<20||nx>WW-20||ny<20||ny>WH-20){e._harborWave=null;if(e===G.pl)$('st').innerHTML='';return}
    hw.lastX=nx;hw.lastY=ny;hw.cnt++;
    // 每隔1步创建效果，减少卡顿
    if(hw.cnt%2===0||hw.cnt===1){
      if(hw.type==='cascade'){
        G.ef.push({t:'harborWave',x:nx,y:ny,s:n,d:600,r:80});
        spP(nx,ny,14,'#06b6d4',4);
        const allTargets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&o!==e&&d2({x:nx,y:ny},o)<50);
        allTargets.forEach(o=>{
          o._blind=Math.max(o._blind||0,n+2000);
          o._slow=Math.max(o._slow||0,n+3500);
          o._slowAmt=0.4;
          o.hp=Math.max(0,o.hp-20);
          spP(o.x,o.y,10,'#7dd3fc',4);
        });
      }else{
        // tide已改为连续追踪，不再需要step扩展
        G.ef.push({t:'harborWave',x:nx,y:ny,s:n,d:500,r:30});
        const allTargets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&o!==e&&Math.abs(Math.atan2(o.y-ny,o.x-nx)-hw.dir)<0.6&&d2({x:nx,y:ny},o)<80);
        allTargets.forEach(o=>{
          o._slow=Math.max(o._slow||0,n+3500);
          o._slowAmt=0.4;
          o.hp=Math.max(0,o.hp-10);
          spP(o.x,o.y,6,'#7dd3fc',3);
        });
      }
    }
    if(hw.cnt%3===0)spP(nx,ny,6,'#06b6d4',3);
  });

  // ── 海神线烟：持续跟随玩家朝向，绘制路径为烟墙 ──
  G.ef.filter(ef=>ef.t==='harborTide'&&ef.owner&&ef.owner.al&&ef.hp>0&&n-ef.s<ef.d).forEach(ef=>{
    const pth=ef.path;
    if(!pth||pth.length<1)return;
    const last=pth[pth.length-1];
    const step=25;
    // 使用拥有者的当前朝向（每帧更新）
    const nx=cp(last.x+Math.cos(ef.owner.ag)*step,20,WW-20);
    const ny=cp(last.y+Math.sin(ef.owner.ag)*step,20,WH-20);
    if(!(nx<=20||nx>=WW-20||ny<=20||ny>=WH-20)&&Math.hypot(nx-last.x,ny-last.y)>1&&pth.length<100){
      pth.push({x:nx,y:ny});
    }
    // 粒子飘散
    if(pth.length>1&&Math.random()<.1){
      const idx=Math.floor(Math.random()*(pth.length-1));
      const p1=pth[idx],p2=pth[idx+1],t=Math.random();
      spP(p1.x+(p2.x-p1.x)*t,p1.y+(p2.y-p1.y)*t,1,'#94a3b8',1);
    }
  });

  // ── 海神怒涛（移动巨浪） ──
  [G.pl,...G.fr,...G.en].filter(e=>e&&e.al&&e._harborUlt).forEach(e=>{
    const hu=e._harborUlt;
    const step=3.5;
    const nx=hu.lastX+Math.cos(hu.dir)*step;
    const ny=hu.lastY+Math.sin(hu.dir)*step;
    if(nx<20||nx>WW-20||ny<20||ny>WH-20){e._harborUlt=null;return}
    hu.lastX=nx;hu.lastY=ny;hu.cnt++;
    const perpX=-Math.sin(hu.dir),perpY=Math.cos(hu.dir);
    if(hu.cnt%20===0||hu.cnt===1){
      for(let side=-25;side<=25;side++){
        const segX=cp(nx+perpX*side*32,20,WW-20), segY=cp(ny+perpY*side*32,20,WH-20);
        if(segX>20&&segX<WW-20&&segY>20&&segY<WH-20)
          G.ef.push({t:'harborUlt',x:segX-25,y:segY-20,w:50,h:40,s:n,d:3000});
      }
      emitSound(nx,ny,600,'neutral','wave');
    }
    if(hu.cnt%3===0){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&o!==e&&Math.abs(perpX*(o.x-nx)+perpY*(o.y-ny))<800&&Math.abs(Math.cos(hu.dir)*(o.x-nx)+Math.sin(hu.dir)*(o.y-ny))<150);
      targets.forEach(o=>{
        const key=o.ip?o.tp+'_pl':o.tp+'_'+Math.round(o.x/50)+'_'+Math.round(o.y/50);
        if(hu.hitSet&&hu.hitSet.has(key))return;
        if(!hu.hitSet)hu.hitSet=new Set();
        hu.hitSet.add(key);
        o._stun=Math.max(o._stun||0,n+2500);
        o._blind=Math.max(o._blind||0,n+2000);
        o._slow=Math.max(o._slow||0,n+4000);
        o._slowAmt=0.4;
        o.hp=Math.max(0,o.hp-40);
        // 真正缴械：禁用武器与所有技能
        o._disarm=n+12000;
        if(o.sk)o.sk.forEach(sk=>{sk.ce=Math.max(sk.ce||0,n+12000)});
      const pushAng=Math.atan2(o.y-e.y,o.x-e.x);
      o.x=cp(o.x+Math.cos(pushAng)*60,20,WW-20);
      o.y=cp(o.y+Math.sin(pushAng)*60,20,WH-20);
      spP(o.x,o.y,20,'#38bdf8',8);
      });
    }
    // 怒涛摧毁非海神技能效果
    if(hu.cnt%5===0){
      for(let ei=G.ef.length-1;ei>=0;ei--){
        const ef=G.ef[ei];
        if(!ef||ef.t==='harborTide'||ef.t==='harborCove'||ef.t==='harborWave'||ef.t==='harborUlt')continue;
        const efX=ef.x!==undefined?ef.x:ef.x1||0;
        const efY=ef.y!==undefined?ef.y:ef.y1||0;
        if(Math.abs(perpX*(efX-nx)+perpY*(efY-ny))<900&&Math.abs(Math.cos(hu.dir)*(efX-nx)+Math.sin(hu.dir)*(efY-ny))<200){
          spP(efX,efY,25,'#7dd3fc',6);
          G.ef.splice(ei,1);
        }
      }
    }
    if(hu.cnt%15===0)spP(nx,ny,25,'#06b6d4',10);
  });

  // 清理过期声音
  G.sd=G.sd.filter(s=>n-s.t<2500);

  // ── 大招充能（每秒约10%）──
  [G.pl,...G.fr,...G.en].forEach(e=>{if(e&&e.al&&e._ult<e._ultMax){e._ult=Math.min(e._ultMax,e._ult+dt*0.01)}});

  // ── 游戏世界更新（无论生死都执行）──
  G.en.forEach(e=>aiUpdate(e,true));
  G.fr.forEach(e=>aiUpdate(e,false));

  // 胜负判定
  const aliveFriends=G.fr.some(f=>f.al)||alive;
  const aliveEnemies=G.en.some(e=>e.al);
  if(!aliveFriends&&G.rnS==='active'){eR('en','全灭');uI();return}
  if(!aliveEnemies&&G.rnS==='active'){eR('atk','全灭');uI();return}

  // 子弹
  for(let i=G.bl.length-1;i>=0;i--){
    const b=G.bl[i];b.x+=b.vx;b.y+=b.vy;b.l--;
    b.tr.push({x:b.x,y:b.y});if(b.tr.length>5)b.tr.shift();
    // 提前计算伤害
    const bDist=Math.hypot(b.x-b.sx,b.y-b.sy);
    const bFalloff=Math.max(0.15,Math.min(1,1-bDist/b.mr));
    let bDmgFinal=Math.round(b.d*bFalloff);
    if(!b.isE&&p&&p._chamberUlt){bDmgFinal*=2;p._chamberUlt=false;if(p===G.pl)$('st').innerHTML=''}
    // 子弹碰撞检测：地图墙 + 屏障/掩体 + 准备墙
    let hw=0;
    for(const w of WL){if(!w)continue;if(pir(b.x,b.y,w)){hw=1;break}}
    if(!hw&&G._prepWalls)for(const pw of G._prepWalls){if(pir(b.x,b.y,[pw.x,pw.y,pw.w,pw.h])){hw=1;break}}
    for(const ef of G.ef){if((ef.t==='barrier'||ef.t==='cover')&&n-ef.s<ef.d&&pir(b.x,b.y,[ef.x,ef.y,ef.w||120,ef.h||20])){hw=1;break}
      if(ef.t==='harborCove'&&n-ef.s<ef.d&&pir(b.x,b.y,[ef.x,ef.y,ef.w||120,ef.h||20])){
        ef.hp=Math.max(0,(ef.hp||0)-bDmgFinal);
        ef._lastHit=n;
        spP(b.x,b.y,4,'#7dd3fc',2);
        hw=1;break
      }
      if(ef.t==='harborTide'&&n-ef.s<ef.d&&ef.hp>0&&ef.path){
        const pth=ef.path,thick=ef.thick||10;
        let hitLine=false;
        for(let pi=1;pi<pth.length&&!hitLine;pi++){
          const p1=pth[pi-1],p2=pth[pi];
          const dx=p2.x-p1.x,dy=p2.y-p1.y;
          const len2=dx*dx+dy*dy;
          if(len2===0){if(Math.hypot(b.x-p1.x,b.y-p1.y)<thick)hitLine=true}
          else{
            let t=((b.x-p1.x)*dx+(b.y-p1.y)*dy)/len2;
            t=Math.max(0,Math.min(1,t));
            const cx=p1.x+t*dx,cy=p1.y+t*dy;
            if(Math.hypot(b.x-cx,b.y-cy)<thick)hitLine=true;
          }
        }
        if(hitLine){
          ef.hp=Math.max(0,(ef.hp||0)-bDmgFinal);
          ef._lastHit=n;
          spP(b.x,b.y,4,'#7dd3fc',2);
          if(ef.hp<=0&&ef.path&&ef.path.length>0){const sp=ef.path[0];spP(sp.x,sp.y,40,'#38bdf8',6)}
          hw=1;break;
        }
      }}
    if(hw||b.l<=0||b.x<-50||b.x>WW+50||b.y<-50||b.y>WH+50){G.bl.splice(i,1);continue}
    if(b.isE){
      // 敌人子弹命中玩家
      if(alive&&d2(b,p)<p.r+b.r){
        if(p._turtle>n||p._dismiss>n){spP(b.x,b.y,3,'#22c55e',1);G.bl.splice(i,1);continue}
        p.hp=Math.max(0,p.hp-bDmgFinal);p.hf=6;G.df=6;spP(b.x,b.y,4,'#ef4444',2);G.bl.splice(i,1);uI();
        if(p.hp<=0){p.al=0;emitSound(p.x,p.y,400,p.tm,'death');G._alerts.push({x:p.x,y:p.y,t:n,team:G.team});if(p._bomb){p._bomb=0;G.bo={x:p.x,y:p.y};spP(p.x,p.y,16,'#fbbf24',5)}kF(b,p);onAgentDeath(p,n,b)}
      continue}
      for(let j=G.fr.length-1;j>=0;j--){const f=G.fr[j];if(!f.al)continue;if(d2(b,f)<f.r+b.r){if(f._turtle>n||f._dismiss>n){spP(b.x,b.y,3,'#22c55e',1);G.bl.splice(i,1);break}f.hp-=bDmgFinal;f.hf=4;spP(b.x,b.y,3,'#ef4444',2);G.bl.splice(i,1);if(f.hp<=0){f.al=0;G._alerts.push({x:f.x,y:f.y,t:n,team:G.team});if(f._bomb){f._bomb=0;G.bo={x:f.x,y:f.y};spP(f.x,f.y,16,'#fbbf24',5)}kF(b,f);spP(f.x,f.y,15,'#ef4444',4);onAgentDeath(f,n,b)}break}}
    }else{
      let hit=0;
      for(let j=G.en.length-1;j>=0;j--){const e=G.en[j];if(!e.al)continue;
        if(d2(b,e)<e.r+b.r){if(e._turtle>n||e._dismiss>n){spP(b.x,b.y,3,'#22c55e',1);G.bl.splice(i,1);hit=1;break}e.hp-=bDmgFinal;e.hf=4;spP(b.x,b.y,3,'#94a3b8',2);hit=1;
          if(e.hp<=0){G.kl++;spP(e.x,e.y,20,'#fbbf24',5);kF(p||G.fr[0]||e,e);e.al=0;G._alerts.push({x:e.x,y:e.y,t:n,team:G.team==='atk'?'def':'atk'});if(e._bomb){e._bomb=0;G.bo={x:e.x,y:e.y};spP(e.x,e.y,16,'#fbbf24',5)};onAgentDeath(e,n,b)}
          G.bl.splice(i,1);break
        }
      }if(hit)continue;
    }
  }

  // 效果（烟雾+闪光+侦查，总量上限500）
  if(G.ef.length>500)G.ef.splice(0,G.ef.length-500);
  for(let i=G.ef.length-1;i>=0;i--){
    const ef=G.ef[i];if(n-ef.s>ef.d)G.ef.splice(i,1);
    // 海盾生命值系统
    if(ef.t==='harborCove'){
      if(ef.hp<=0){G.ef.splice(i,1);continue}
      if(n-ef._lastHit>1000&&ef.hp<ef.mxhp)ef.hp=Math.min(ef.mxhp,ef.hp+30*dt*0.06);
      if(n-ef.s>=ef.d&&ef.hp>0){
        ef.s=n;
        ef.hp=Math.max(0,ef.hp-50);
        ef.d=Math.min(30000,ef.d+1000);
      }
    }
    // 海盾免疫负面效果：检查范围内的单位，移除负面状态
    if(ef.t==='harborCove'){
      const domeR=(ef.w||200)/2,cx=ef.x+domeR,cy=ef.y+domeR;
      [G.pl,...G.fr,...G.en].forEach(u=>{
        if(u&&u.al&&d2({x:cx,y:cy},u)<domeR+30){
          u._blind=0;u._slow=0;u._stun=0;u._disarm=0;
        }
      });
    }
    if(ef.t==='harborTide'){
      if(ef.hp<=0){G.ef.splice(i,1);continue}
      // 释放者死亡则消散
      if(ef.owner&&!ef.owner.al){ef.hp=0;G.ef.splice(i,1);continue}
      // 低速回血（脱离战斗每秒约恢复1.8HP）
      if(ef._lastHit&&n-ef._lastHit>1000&&ef.hp<ef.mxhp)ef.hp=Math.min(ef.mxhp,ef.hp+30*dt*0.06);
    }
    if(ef.t==='reveal'){[...G.fr,G.pl,G.en].forEach(e=>{if(e.al&&d2(ef,e)<ef.r)e.rv=1})}
    if(ef.t==='flash'){
      const all=[G.pl,...G.fr,...G.en].filter(e=>e&&e.al&&e!==ef.ip);
      all.forEach(e=>{
        const dist=d2(e,ef);
        if(dist<ef.r){
          const ang=Math.abs(Math.atan2(e.y-ef.y,e.x-ef.x)-e.ag);
          // 面向闪光（夹角<120°）且距离越近致盲越久
          if(ang<2.1||dist<60)e._blind=Math.max(e._blind||0,n+Math.max(500,2000-dist*5));
        }
      });
    }
    // ═══ 手雷爆炸 ═══
    if(ef.t==='grenade'&&n-ef.s>300){
      const enemies=ef.ip.tm==='fr'?G.en:[G.pl,...G.fr];
      enemies.forEach(o=>{if(o.al&&d2(ef,o)<ef.r){const raw=60-Math.round(d2(ef,o)*.3);const dmg=coveAbsorbDmg(o,Math.max(10,raw));o.hp=Math.max(0,o.hp-dmg);spP(o.x,o.y,6,'#ef4444',3)}});
      spP(ef.x,ef.y,30,'#f97316',6);
      // 爆炸碎片
      for(let i=0;i<6;i++)G.pt.push({x:ef.x,y:ef.y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,l:15,mx:25,r:2+Math.random()*3,c:'#f59e0b'});
    }
    // ═══ 毒气持续伤害 ═══
    if(ef.t==='poison'){
      const enemies=ef.ip.tm==='fr'?G.en:[G.pl,...G.fr];
      if(n-ef.s>ef._lt){
        ef._lt=n+1000;
        enemies.forEach(o=>{if(o.al&&d2(ef,o)<ef.r){const dmg=coveAbsorbDmg(o,15);o.hp=Math.max(0,o.hp-dmg);spP(o.x,o.y,4,'#4ade80',2)}});
      }
    }
    // ═══ 落雷伤害 ═══
    if(ef.t==='strike'&&n-ef.s<50){
      const enemies=ef.ip.tm==='fr'?G.en:[G.pl,...G.fr];
      enemies.forEach(o=>{if(o.al&&d2(ef,o)<ef.r){const raw=80-Math.round(d2(ef,o)*.5);const dmg=coveAbsorbDmg(o,Math.max(20,raw));o.hp=Math.max(0,o.hp-dmg);o._stun=n+300;spP(o.x,o.y,8,'#a78bfa',3)}});
      for(let i=0;i<10;i++)G.pt.push({x:ef.x,y:ef.y,vx:(Math.random()-.5)*12,vy:(Math.random()-.5)*12,l:10,mx:20,r:1+Math.random()*4,c:'#8b5cf6'});
    }
    // ═══ 冰冻：区域内敌人持续冻结 ═══
    if(ef.t==='freeze'){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&d2(ef,o)<ef.r);
      targets.forEach(o=>{if(o!==ef.ip){const dmg=coveAbsorbDmg(o,8);o._stun=Math.max(o._stun||0,n+1800);o._slst=o._slst||0;if(n>o._slst){o._slst=n+300;o.hp=Math.max(0,o.hp-dmg);spP(o.x,o.y,3,'#7dd3fc',2)}}});
      // 持续冻结粒子（更多）
      if(n-ef.s>ef._lt){ef._lt=n+300;for(let i=0;i<3;i++){const a=Math.random()*6.28,r=Math.random()*ef.r;G.pt.push({x:ef.x+Math.cos(a)*r,y:ef.y+Math.sin(a)*r,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,l:18,mx:30,r:2+Math.random()*3,c:'#7dd3fc'})}}
    }
    // ─── 幻棱烈焰墙：灼烧敌人 + 治疗幻棱 ───
    if(ef.t==='phoenixWall'&&n-ef.s>ef._lt){
      ef._lt=n+500;
      const all=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al);
      all.forEach(o=>{
        if(d2(ef,o)<40){
          if(o.tp==='phoenix'){
            // 菲尼克斯穿火墙回血
            o.hp=Math.min(o.mx,o.hp+10);
            spP(o.x,o.y,3,'#f97316',1);
          }else{
            // 敌人灼烧
            const dmg=coveAbsorbDmg(o,12);
            o.hp=Math.max(0,o.hp-dmg);
            o._stun=Math.max(o._stun||0,_()+300);
            spP(o.x,o.y,4,'#f97316',2);
          }
        }
      });
    }
    // ─── 彩雷飞溅：延迟 → 分裂子榴弹 ───
    if(ef.t==='razeCluster'&&n-ef.s>300){
      // 主弹爆炸
      const enemies=ef.ip.tm==='fr'?G.en:[G.pl,...G.fr];
      enemies.forEach(o=>{if(o.al&&d2(ef,o)<ef.r){const dmg=coveAbsorbDmg(o,50);o.hp=Math.max(0,o.hp-dmg);spP(o.x,o.y,8,'#ef4444',3)}});
      // 分裂3颗子榴弹
      for(let si=0;si<3;si++){
        const sa=si/3*6.28+Math.random()*0.5;
        const sx=cp(ef.x+Math.cos(sa)*50,20,WW-20),sy=cp(ef.y+Math.sin(sa)*50,20,WH-20);
        G.ef.push({t:'grenade',x:sx,y:sy,s:n,d:200,r:80,ip:ef.ip});
        spP(sx,sy,10,'#f97316',4);
      }
      spP(ef.x,ef.y,40,'#f97316',8);
    }
    // ─── 爆炸通用处理（雷兹相关） ───
    if(ef.t==='explosion'&&n-ef.s<50){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&d2(ef,o)<(ef.r||100));
      targets.forEach(o=>{
        o.hp=Math.max(0,o.hp-(ef.damage||50));
        const pushAng=Math.atan2(o.y-ef.y,o.x-ef.x);
        o.x+=Math.cos(pushAng)*30; o.y+=Math.sin(pushAng)*30;
        spP(o.x,o.y,6,'#ef4444',3);
      });
    }
    // ─── 幽影暗魇：缩小视野 ───
    if(ef.t==='omenParanoia'){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&d2(ef,o)<(ef.r||200));
      targets.forEach(o=>{
        o._blind=Math.max(o._blind||0,n+Math.max(500,1500-d2(ef,o)*3));
        o._paranoia=n+1500;
      });
    }
    // ─── 宇宙裂变：阻挡效果 ───
    if(ef.t==='cosmicDivide'){
      // 细线阻挡子弹
      const dx=ef.x2-ef.x1,dy=ef.y2-ef.y1,len2=dx*dx+dy*dy,thick=ef.thick||20;
      G.bl.forEach(b=>{
        let hit=false;
        if(len2===0){if(Math.hypot(b.x-ef.x1,b.y-ef.y1)<thick)hit=true}
        else{let t=((b.x-ef.x1)*dx+(b.y-ef.y1)*dy)/len2;t=Math.max(0,Math.min(1,t));const cx=ef.x1+t*dx,cy=ef.y1+t*dy;if(Math.hypot(b.x-cx,b.y-cy)<thick)hit=true}
        if(hit)b.l=0;
      });
    }
    // ─── 海神怒涛：持续减速 ───
    if(ef.t==='harborUlt'){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&d2(ef,o)<(ef.r||300));
      targets.forEach(o=>{
        o._stun=Math.max(o._stun||0,n+500);
        if(n>ef._lt){ef._lt=n+400;o.hp=Math.max(0,o.hp-5);spP(o.x,o.y,3,'#06b6d4',2)}
      });
    }
    // ─── 霓虹加速道：接触伤害 ───
    if(ef.t==='neonWall'&&n-ef.s>ef._lt){
      ef._lt=n+600;
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&pir(o.x,o.y,[ef.x,ef.y,ef.w||40,ef.h||20]));
      targets.forEach(o=>{o.hp=Math.max(0,o.hp-8);o._stun=Math.max(o._stun||0,n+200);spP(o.x,o.y,3,'#38bdf8',2)});
    }
    // ═══ 磁力：将敌人吸向中心并减速 ═══
    if(ef.t==='magnet'){
      const enemies=ef.ip&&ef.ip.tm==='fr'?G.en:[G.pl,...G.fr];
      enemies.forEach(o=>{if(o.al&&d2(ef,o)<ef.r&&o!==ef.ip){
        const pullAngle=Math.atan2(ef.y-o.y,ef.x-o.x);
        const d=d2(ef,o);
        const pullStr=18*(1-d/ef.r);
        o.x=cp(o.x+Math.cos(pullAngle)*pullStr,20,WW-20);
        o.y=cp(o.y+Math.sin(pullAngle)*pullStr,20,WH-20);
        col(o,o.r);
        // 减速效果
        o._slst=Math.max(o._slst||0,n+100);
      }});
      // 吸引尾迹（增强）
      if(Math.random()<.5){const a=Math.random()*6.28;G.pt.push({x:ef.x+Math.cos(a)*ef.r*.8,y:ef.y+Math.sin(a)*ef.r*.8,vx:-Math.cos(a)*3,vy:-Math.sin(a)*3,l:15,mx:25,r:3,c:'#c4b5fd'})}
    }
    // ═══ 推波：推开前方大范围敌人并伤害 ═══
    if(ef.t==='push'&&n-ef.s<50){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&o!==ef.ip);
      targets.forEach(o=>{
        const d=d2(ef,o);
        if(d<ef.r&&d>5){
          const ang=Math.abs(Math.atan2(o.y-ef.y,o.x-ef.x)-ef.ag);
          if(ang<2.2){  // 约125°扇形
            const pushA=Math.atan2(o.y-ef.y,o.x-ef.x);
            const pushStr=20*(1-d/ef.r);
            o.x=cp(o.x+Math.cos(pushA)*pushStr,20,WW-20);
            o.y=cp(o.y+Math.sin(pushA)*pushStr,20,WH-20);
            col(o,o.r);
            o._stun=Math.max(o._stun||0,n+800);
            o.hp=Math.max(0,o.hp-20);
            o._slow=Math.max(o._slow||0,n+2000);  // 2秒减速
            spP(o.x,o.y,8,'#38bdf8',4);
            // 震荡尾迹
            for(let i=0;i<3;i++){const a=Math.random()*6.28;G.pt.push({x:o.x+Math.cos(a)*(5+Math.random()*10),y:o.y+Math.sin(a)*(5+Math.random()*10),vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,l:12,mx:20,r:2+Math.random()*2,c:'#38bdf8'})}
          }
        }
      });
      // 屏幕震荡
      G.shake=Math.max(G.shake||0,8);
      // 冲击波残留粒子
      for(let i=0;i<6;i++){const a=ef.ag+(Math.random()-.5)*2.5;G.pt.push({x:ef.x+Math.cos(a)*ef.r*0.3,y:ef.y+Math.sin(a)*ef.r*0.3,vx:Math.cos(a)*(2+Math.random()*2),vy:Math.sin(a)*(2+Math.random()*2),l:10,mx:18,r:2+Math.random()*2,c:'#7dd3fc'})}
    }
    // ═══ 大招：重力场 ═══
    if(ef.t==='gravity'){
      const targets=[G.pl,...G.fr,...G.en].filter(o=>o&&o.al&&o!==ef.ip);
      targets.forEach(o=>{if(d2(ef,o)<ef.r){
        const a=Math.atan2(ef.y-o.y,ef.x-o.x);
        const p=5*(1-d2(ef,o)/ef.r);
        o.x=cp(o.x+Math.cos(a)*p,20,WW-20);
        o.y=cp(o.y+Math.sin(a)*p,20,WH-20);
        col(o,o.r);
        o._slow=Math.max(o._slow||0,n+100);
        if(n>ef._lt+500){ef._lt=n;o.hp=Math.max(0,o.hp-8);spP(o.x,o.y,4,'#8b5cf6',2)}
      }});
      // 漩涡粒子
      if(Math.random()<.4){const a=Math.random()*6.28;G.pt.push({x:ef.x+Math.cos(a)*ef.r*.8,y:ef.y+Math.sin(a)*ef.r*.8,vx:-Math.cos(a)*4,vy:-Math.sin(a)*4,l:15,mx:25,r:2+Math.random()*2,c:'#c4b5fd'})}
    }
  }
  // 投射物
  for(let i=G.pr.length-1;i>=0;i--){
    const pr=G.pr[i];pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
    for(const w of WL){if(!w)continue;if(pir(pr.x,pr.y,w)){pr.life=0;break}}
    // 线烟/海盾阻挡投射物
    if(pr.life>0&&(tideBlockProj(pr.x,pr.y)||coveBlockProj(pr.x,pr.y,pr))){G.pr.splice(i,1);continue}
    if(pr.life<=0||pr.x<-50||pr.x>WW+50||pr.y<-50||pr.y>WH+50){G.pr.splice(i,1);continue}
    if(pr.t==='drone'){
      // 搜索附近的敌人并追踪
      const targetTeam=pr.team==='fr'?G.en:[G.pl,...G.fr];
      let closest=null,cd=400;
      for(const t of targetTeam){if(t.al){const dd=d2(pr,t);if(dd<cd){cd=dd;closest=t}}}
      if(closest){
        // 追踪目标
        const ta=Math.atan2(closest.y-pr.y,closest.x-pr.x);
        pr.vx+=Math.cos(ta)*0.3;pr.vy+=Math.sin(ta)*0.3;
        const spd=Math.hypot(pr.vx,pr.vy);
        if(spd>5){pr.vx=pr.vx/spd*5;pr.vy=pr.vy/spd*5}
        // 攻击
        if(cd<50&&n>pr.att){pr.att=n+350;closest.hp=Math.max(0,closest.hp-25);spP(closest.x,closest.y,6,'#fbbf24',3);spP(pr.x,pr.y,4,'#f97316',1)}
      }else{
        // 无目标时直线飞行
        pr.vx*=0.98;pr.vy*=0.98;
        const spd=Math.hypot(pr.vx,pr.vy);
        if(spd<1){pr.vx+=Math.cos(pr.ag||0)*0.2;pr.vy+=Math.sin(pr.ag||0)*0.2}
      }
      // 无人机标记附近敌人
      [...G.en,...G.fr].forEach(e=>{if(e.al&&d2(pr,e)<150){e.rv=1;e.re=n+800}})
    }
    // ─── 雷兹机炮（地面行走，遇墙弹开） ───
    if(pr.t==='razeDrone'){
      // 地面摩擦+弹墙
      const targetTeam=pr.team==='fr'?G.en:[G.pl,...G.fr];
      let closest=null,cd=400;
      for(const t of targetTeam){if(t.al){const dd=d2(pr,t);if(dd<cd){cd=dd;closest=t}}}
      // 墙体反弹
      for(const w of WL){if(!w)continue;if(pir(pr.x,pr.y,w)){pr.vx*=-1;pr.vy*=-1;break}}
      if(closest&&cd<200){
        // 锁定追踪
        const ta=Math.atan2(closest.y-pr.y,closest.x-pr.x);
        pr.vx=Math.cos(ta)*3.5;pr.vy=Math.sin(ta)*3.5;
        if(cd<30){
          // 引爆
          G.ef.push({t:'explosion',x:pr.x,y:pr.y,s:n,d:200,r:100,damage:50});
          targetTeam.forEach(t=>{if(t.al&&d2(pr,t)<100){t.hp=Math.max(0,t.hp-50);spP(t.x,t.y,10,'#ef4444',4)}});
          pr.life=0;
          spP(pr.x,pr.y,30,'#f97316',10);
        }
      }else{
        // 保持移动
        const spd=Math.hypot(pr.vx,pr.vy);
        if(spd<2.5){pr.vx=Math.cos((pr._angle||0))*3.5;pr.vy=Math.sin((pr._angle||0))*3.5}
      }
      pr.vy=0; // 地面行走，不飞行
    }
    // ─── 雷兹火箭（晚安焰火） ───
    if(pr.t==='razeRocket'){
      // 高速飞行，碰撞爆炸
      for(const w of WL){if(!w)continue;if(pir(pr.x,pr.y,w)){explodeRocket(pr,n);pr.life=0;break}}
      // 检查是否碰到敌人
      const targetTeam=pr.team==='fr'?G.en:[G.pl,...G.fr];
      for(const t of targetTeam){
        if(t.al&&d2(pr,t)<25){
          explodeRocket(pr,n);
          t.hp=Math.max(0,t.hp-100);
          pr.life=0;
          break;
        }
      }
      // 火箭尾迹粒子
      if(pr.life%2===0)spP(pr.x,pr.y,3,'#f97316',4);
    }
  }
  function explodeRocket(pr,n){
    G.ef.push({t:'explosion',x:pr.x,y:pr.y,s:n,d:300,r:150,damage:80});
    spP(pr.x,pr.y,50,'#f97316',15);
    emitSound(pr.x,pr.y,600,'neutral','explosion');
    const targets=G.en.concat(G.fr).concat([G.pl]);
    targets.forEach(t=>{if(t&&t.al&&d2(pr,t)<150){t.hp=Math.max(0,t.hp-80);spP(t.x,t.y,10,'#ef4444',5)}});
  }
  // 粒子（总量上限800，防止卡顿）
  if(G.pt.length>800)G.pt.splice(0,G.pt.length-800);
  for(let i=G.pt.length-1;i>=0;i--){
    const pt=G.pt[i];pt.l--;
    if(!pt.isT){pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.95;pt.vy*=.95}else{pt.y+=pt.vy||0}
    if(pt.l<=0)G.pt.splice(i,1);
  }

  if(G.df>0)G.df--;
  if(alive&&p.hf>0)p.hf--;
  if(alive&&p._slow&&n>p._slow)p._slow=0;
  G.fr.forEach(f=>{if(f.hf>0)f.hf--;if(f._slow&&n>f._slow)f._slow=0});
  G.en.forEach(e=>{if(e.hf>0)e.hf--;if(e._slow&&n>e._slow)e._slow=0});
  uI();
}

// ─── 英雄专属死亡处理 ───
function onAgentDeath(e,n,projectile){
  // 瑞纳：击杀产生魂体
  if(projectile&&projectile.owner&&projectile.owner.tp==='reyna'){
    e._reynaSoul=n;
    spP(e.x,e.y,10,'#c084fc',5);
    const reyna=projectile.owner;
    if(reyna._reynaEmpress){
      // 女皇旨令激活：自动回血
      reyna.hp=Math.min(reyna.mx,reyna.hp+50);
      spP(reyna.x,reyna.y,8,'#c084fc',3);
    }
  }
  // 捷风飓刃：击杀重置
  if(projectile&&projectile.owner&&projectile.owner._jettKnives&&projectile.owner._jettKnives.active){
    projectile.owner._jettKnives.count=5;
    if(projectile.owner===G.pl)spP(G.pl.x,G.pl.y,8,'#87ceeb',5);
  }
  // 暮蝶化蝶：死后复活
  if(e._cloveRevive&&e.tp==='clove'){
    e._cloveRevive=false;
    e.al=1; e.hp=Math.round(e.mx*0.3);
    e.x+=Math.random()*40-20; e.y+=Math.random()*40-20;
    spP(e.x,e.y,40,'#a855f7',15);
    emitSound(e.x,e.y,500,e.tm,'ult');
  }
}

  // ═══ 读条进度 ═══
  if(G.ch){const ch=G.ch,e=ch.e,ex=e.x-cx,ey=e.y-cy-30;

    X.fillStyle='rgba(255,255,255,.6)';X.font='7px sans-serif';X.textAlign='center';X.fillText(ch.tp==='plant'?'⏳埋弹':'⏳拆弹',ex,ey-4);
  }

  // ═══ 交互提示 ═══
  if(G.pl&&G.pl.al&&G.rnS==='active'){
    // 捡弹提示
    if(G.bo&&d2(G.pl,G.bo)<30){X.fillStyle='rgba(251,191,36,.6)';X.font='8px sans-serif';X.textAlign='center';X.fillText('[靠近] 💣捡起',G.bo.x-cx,G.bo.y-cy-20)}
    // 埋弹提示（携弹状态下）
    if(G.team==='atk'&&!G.bomb&&!G.ch&&G.pl._bomb){
      const dA=d2(G.pl,SA),dB=d2(G.pl,SB);
      if(dA<130||dB<130)X.fillText('[F] 埋弹',dA<dB?500-cx:2700-cx,760-cy);
    }
    // 拆弹提示
    if(G.team==='def'&&G.bomb&&!G.ch){const d=d2(G.pl,G.bomb);if(d<15){X.fillStyle='rgba(74,222,128,.6)';X.font='8px sans-serif';X.textAlign='center';X.fillText('[D] 拆弹',G.bomb.x-cx,G.bomb.y-cy-30)}}
  }

  // 效果
  G.ef.forEach(ef=>{
    const x=ef.x-cx,y=ef.y-cy;

    if(ef.t==='smoke'){if(!G.spec){X.fillStyle=`rgba(148,163,184,${a*.5})`;X.beginPath();X.arc(x,y,ef.r||100,0,6.28);X.fill();X.fillStyle=`rgba(148,163,184,${a*.3})`;X.beginPath();X.arc(x,y,(ef.r||100)*.7,0,6.28);X.fill()}}
