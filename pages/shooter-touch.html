      // 连续线状烟墙
      const sx=ef.x1-cx,sy=ef.y1-cy,ex=ef.x2-cx,ey=ef.y2-cy;
      const angle=Math.atan2(ey-sy,ex-sx);
      const len=Math.hypot(ex-sx,ey-sy);
      const thick=ef.thick||40;
      X.save();
      X.translate((sx+ex)/2,(sy+ey)/2);
      X.rotate(angle);
      // 渐变烟雾
      const grd=X.createRadialGradient(0,0,0,0,0,len/2+thick);
      grd.addColorStop(0,`rgba(148,163,184,${a*.5})`);
      grd.addColorStop(.6,`rgba(148,163,184,${a*.35})`);
      grd.addColorStop(1,`rgba(148,163,184,0)`);
      X.fillStyle=grd;X.fillRect(-len/2-thick,-thick/2,len+thick*2,thick);
      X.fillStyle=`rgba(148,163,184,${a*.2})`;X.fillRect(-len/2,-thick/2,len,thick/2);
      X.restore();
    }
    if(ef.t==='fire'){const f=.8+Math.sin(n/100+x)*.2;X.fillStyle=`rgba(249,115,22,${a*.5*f})`;X.beginPath();X.arc(x,y,ef.r||80,0,6.28);X.fill();X.fillStyle=`rgba(251,191,36,${a*.3*f})`;X.beginPath();X.arc(x,y,(ef.r||80)*.5,0,6.28);X.fill()}
    if(ef.t==='reveal'){X.strokeStyle=`rgba(6,182,212,${a*.6})`;X.lineWidth=3;X.setLineDash([8,8]);X.beginPath();X.arc(x,y,ef.r||150,0,6.28);X.stroke();X.setLineDash([])}
    // ═══ 建设掩体渲染 ═══
    if(ef.t==='barrier'){
      X.fillStyle=`rgba(34,197,94,${a*.6})`;X.fillRect(ef.x-cx,ef.y-cy,ef.w||160,ef.h||16);
      X.strokeStyle=`rgba(34,197,94,${a*.8})`;X.lineWidth=2;X.strokeRect(ef.x-cx,ef.y-cy,ef.w||160,ef.h||16);
      X.fillStyle=`rgba(34,197,94,${a*.3})`;X.font='8px sans-serif';X.textAlign='center';X.fillText('🛡️',(ef.x+ef.w/2)-cx,(ef.y+ef.h/2)-cy+4);
    }
    if(ef.t==='cover'){
      X.fillStyle=`rgba(245,158,11,${a*.5})`;X.fillRect(ef.x-cx,ef.y-cy,ef.w||120,ef.h||12);
      X.strokeStyle=`rgba(217,119,6,${a*.7})`;X.lineWidth=2;X.strokeRect(ef.x-cx,ef.y-cy,ef.w||120,ef.h||12);
      X.fillStyle=`rgba(251,191,36,${a*.4})`;X.font='7px sans-serif';X.textAlign='center';X.fillText('🏗️',(ef.x+ef.w/2)-cx,(ef.y+ef.h/2)-cy+3);
    }
    // ═══ 新技能渲染 ═══
    if(ef.t==='grenade'){
      // 飞行中手雷：旋转闪烁
      const fuseLeft=Math.max(0,300-(n-ef.s))/300;
      X.fillStyle=`rgba(239,68,68,${fuseLeft})`;X.font='16px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('💣',x,y);
      X.strokeStyle=`rgba(239,68,68,${fuseLeft*.5})`;X.lineWidth=2;X.beginPath();X.arc(x,y,16,0,6.28);X.stroke();
    }
    if(ef.t==='poison'){
      // 毒气区域：绿色雾气滚动
      const pulse=.7+Math.sin(n/200+ef.x)*.3;
      X.fillStyle=`rgba(34,197,94,${a*.2*pulse})`;X.beginPath();X.arc(x,y,ef.r||90,0,6.28);X.fill();
      X.fillStyle=`rgba(74,222,128,${a*.15*pulse})`;X.beginPath();X.arc(x,y,(ef.r||90)*.6,0,6.28);X.fill();
      X.fillStyle='rgba(74,222,128,.05)';for(let i=0;i<4;i++){const angle=Math.random()*6.28,r=Math.random()*80;X.beginPath();X.arc(x+Math.cos(angle)*r,y+Math.sin(angle)*r,4+Math.random()*6,0,6.28);X.fill()}
    }
    if(ef.t==='strike'){
      // 落雷：紫色闪电冲击波
      const exAge=(n-ef.s)/ef.d;
      X.strokeStyle=`rgba(139,92,246,${a*.8})`;X.lineWidth=3-2*exAge;X.beginPath();X.arc(x,y,ef.r*(.2+.8*exAge),0,6.28);X.stroke();
      // 闪电分支
      for(let i=0;i<6;i++){const angle=Math.random()*6.28,len=20+Math.random()*40;X.strokeStyle=`rgba(167,139,250,${a*Math.random()*.6})`;X.lineWidth=1.5;X.beginPath();X.moveTo(x,y);for(let j=0;j<4;j++){X.lineTo(x+Math.cos(angle+j*.3)*len*(j+1)/4+Math.random()*8,y+Math.sin(angle+j*.3)*len*(j+1)/4+Math.random()*8)}X.stroke()}
    }
    // ═══ 控制技能渲染 ═══
    if(ef.t==='freeze'){
      // 巨大冰霜领域
      const icePulse=.5+Math.sin(n/200+ef.x*.01)*.5;
      const r=ef.r||150;
      // 多层冰环
      X.fillStyle=`rgba(56,189,248,${a*.1*icePulse})`;X.beginPath();X.arc(x,y,r,0,6.28);X.fill();
      X.fillStyle=`rgba(14,165,233,${a*.06})`;X.beginPath();X.arc(x,y,r*.7,0,6.28);X.fill();
      X.strokeStyle=`rgba(125,211,252,${a*.3*icePulse})`;X.lineWidth=3;X.setLineDash([6,10]);X.beginPath();X.arc(x,y,r,0,6.28);X.stroke();X.setLineDash([]);
      X.strokeStyle=`rgba(147,197,253,${a*.2})`;X.lineWidth=1;X.setLineDash([4,8]);X.beginPath();X.arc(x,y,r*.6,0,6.28);X.stroke();X.setLineDash([]);
      // 冰晶尖刺
      for(let i=0;i<8;i++){const ang=i/8*6.28+Math.sin(n/400)*.3;X.strokeStyle=`rgba(186,230,253,${a*.4})`;X.lineWidth=2;X.beginPath();X.moveTo(x+r*.4*Math.cos(ang),y+r*.4*Math.sin(ang));X.lineTo(x+r*1.1*Math.cos(ang),y+r*1.1*Math.sin(ang));X.stroke()}
      // 中心冰晶
      X.fillStyle='rgba(186,230,253,.6)';X.font='24px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('❄️',x,y);
    }
    if(ef.t==='magnet'){
      // 巨型漩涡：双层旋转光环+拉扯动效
      const swirl=n/150+ef.x*.01;
      const r=ef.r||180;
      // 外层大漩涡
      X.strokeStyle=`rgba(139,92,246,${a*.4})`;X.lineWidth=3;X.beginPath();
      for(let i=0;i<30;i++){const t=i/30*6.28;const spiral=(.1+.9*i/30)*r;X.lineTo(x+Math.cos(t+swirl)*spiral,y+Math.sin(t+swirl)*spiral)}
      X.stroke();
      X.strokeStyle=`rgba(167,139,250,${a*.25})`;X.lineWidth=2;X.beginPath();
      for(let i=0;i<24;i++){const t=i/24*6.28;const spiral=(.1+.7*i/24)*r;X.lineTo(x+Math.cos(-t+swirl*.8)*spiral,y+Math.sin(-t+swirl*.8)*spiral)}
      X.stroke();
      // 向心力线
      for(let i=0;i<6;i++){const ang=i/6*6.28+swirl*.5;X.strokeStyle=`rgba(196,181,253,${a*.2})`;X.lineWidth=1;X.beginPath();X.moveTo(x+r*Math.cos(ang),y+r*Math.sin(ang));X.lineTo(x+r*.2*Math.cos(ang),y+r*.2*Math.sin(ang));X.stroke()}
      X.fillStyle='rgba(196,181,253,.5)';X.font='22px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('🌀',x,y);
    }
    if(ef.t==='push'){
      // 推波：巨大蓝色扇形冲击波
      const pushAge=(n-ef.s)/ef.d;
      const pushR=ef.r*pushAge;
      const coneW=2;  // 约115°
      // 外层冲击波
      X.strokeStyle=`rgba(6,182,212,${a*.5*(1-pushAge)})`;X.lineWidth=3;X.beginPath();X.arc(x,y,pushR,ef.ag-coneW,ef.ag+coneW);X.stroke();
      // 内层波
      X.strokeStyle=`rgba(56,189,248,${a*.35*(1-pushAge)})`;X.lineWidth=5;X.beginPath();X.arc(x,y,pushR*.7,ef.ag-coneW*0.8,ef.ag+coneW*0.8);X.stroke();
      // 中心爆发
      X.fillStyle=`rgba(186,230,253,${a*.3*(1-pushAge)})`;X.beginPath();X.arc(x,y,pushR*.15,0,6.28);X.fill();
      // 推进射线
      for(let i=-3;i<=3;i++){const ang=ef.ag+i*0.3;X.strokeStyle=`rgba(125,211,252,${a*.15*(1-pushAge)*(1-Math.abs(i)/4)})`;X.lineWidth=1.5;X.beginPath();X.moveTo(x+pushR*.05*Math.cos(ang),y+pushR*.05*Math.sin(ang));X.lineTo(x+pushR*1.1*Math.cos(ang),y+pushR*1.1*Math.sin(ang));X.stroke()}
    }
    // ─── 幻棱：烈焰墙 ───
    if(ef.t==='phoenixWall'){
      const flicker=.8+Math.sin(n/80+ef.x+ef.y)*.2;
      X.fillStyle=`rgba(249,115,22,${a*.5*flicker})`;
      X.fillRect(ef.x-cx,ef.y-cy,ef.w||60,ef.h||24);
      X.fillStyle=`rgba(251,191,36,${a*.3*flicker})`;
      X.fillRect(ef.x-cx-2,ef.y-cy-2,(ef.w||60)+4,(ef.h||24)+4);
      X.fillStyle='rgba(251,191,36,.6)';X.font='18px sans-serif';X.textAlign='center';X.fillText('🔥',(ef.x+ef.w/2)-cx,(ef.y+ef.h/2)-cy+5);
    }
    // ─── 霓虹：加速道 ───
    if(ef.t==='neonWall'){
      const pulse=.7+Math.sin(n/100+ef.x)*.3;
      X.fillStyle=`rgba(56,189,248,${a*.3*pulse})`;
      X.fillRect(ef.x-cx,ef.y-cy,ef.w||40,ef.h||20);
      X.strokeStyle=`rgba(14,165,233,${a*.6*pulse})`;
      X.lineWidth=2;X.strokeRect(ef.x-cx,ef.y-cy,ef.w||40,ef.h||20);
    }
    // ─── 壹决：凝聚护盾 ───
    if(ef.t==='isoShield'){
      X.fillStyle=`rgba(251,191,36,${a*.25})`;
      X.fillRect(ef.x-cx,ef.y-cy,ef.w||70,ef.h||140);
      X.strokeStyle=`rgba(251,191,36,${a*.5})`;
      X.lineWidth=3;X.strokeRect(ef.x-cx,ef.y-cy,ef.w||70,ef.h||140);
      // 能量流动
      const flowY=(n/100+ef.y)%(ef.h||140);
      X.fillStyle=`rgba(253,224,71,${a*.3})`;
      X.fillRect(ef.x-cx,ef.y-cy+flowY-5,ef.w||70,10);
    }
    // ─── 爆炸（雷兹爆破包/火箭/机炮） ───
    if(ef.t==='explosion'){
      const exR=ef.r*(1-Math.max(0,(n-ef.s)/ef.d));
      X.fillStyle=`rgba(249,115,22,${a*.4})`;
      X.beginPath();X.arc(x,y,exR,0,6.28);X.fill();
      X.fillStyle=`rgba(251,191,36,${a*.25})`;
      X.beginPath();X.arc(x,y,exR*.6,0,6.28);X.fill();
      X.fillStyle=`rgba(255,255,200,${a*.15})`;
      X.beginPath();X.arc(x,y,exR*.3,0,6.28);X.fill();
    }
    // ─── 幽影暗魇 ───
    if(ef.t==='omenParanoia'){
      X.fillStyle=`rgba(99,102,241,${a*.15})`;
      X.beginPath();X.arc(x,y,ef.r||200,0,6.28);X.fill();
      X.strokeStyle=`rgba(129,140,248,${a*.3})`;
      X.lineWidth=2;X.setLineDash([5,8]);X.beginPath();X.arc(x,y,ef.r||200,0,6.28);X.stroke();X.setLineDash([]);
    }
    // ─── 宇宙裂变 ───
    if(ef.t==='cosmicDivide'){
      const sx=ef.x1-cx,sy=ef.y1-cy,ex=ef.x2-cx,ey=ef.y2-cy;
      const angle=Math.atan2(ey-sy,ex-sx),len=Math.hypot(ex-sx,ey-sy),thick=ef.thick||20;
      X.save();
      X.translate((sx+ex)/2,(sy+ey)/2);
      X.rotate(angle);
      // 外发光
      X.fillStyle=`rgba(139,92,246,${a*.12})`;
      X.fillRect(-len/2-thick,-thick,len+thick*2,thick*2);
      // 主体
      X.fillStyle=`rgba(167,139,250,${a*.4})`;
      X.fillRect(-len/2,-thick/3,len,thick*.67);
      // 核心高光
      X.fillStyle=`rgba(196,181,253,${a*.6})`;
      X.fillRect(-len/2,-1,len,2);
      X.restore();
      // 闪烁星光沿路径
      if(Math.random()<.15){const t=Math.random();X.fillStyle=`rgba(255,255,255,${a*Math.random()*.8})`;X.beginPath();X.arc(ef.x1+(ef.x2-ef.x1)*t-cx,ef.y1+(ef.y2-ef.y1)*t-cy,1+Math.random()*2,0,6.28);X.fill()}
    }
    // ─── 海神水墙 (Cove) ───
    if(ef.t==='harborCove'){
      // 球形水泡护盾(球烟)，阻挡子弹不减速，生命值1000
      const pulse=.5+Math.sin(n/100+ef.x)*.5;
      const domeR=(ef.w||90)/2;
      const hpRatio=ef.hp/ef.mxhp;
      // 颜色随血量变化：满血蓝→残血红
      const r=Math.round(6+220*(1-hpRatio));
      const g=Math.round(56+139*hpRatio);
      const b=Math.round(248-100*(1-hpRatio));
      X.fillStyle=`rgba(${r},${g},${b},${a*.12*pulse})`;
      X.beginPath();X.arc(x+domeR,y+domeR,domeR,0,6.28);X.fill();
      X.fillStyle=`rgba(${r},${g},${b},${a*.2*pulse})`;
      X.beginPath();X.arc(x+domeR,y+domeR,domeR-5,0,6.28);X.fill();
      X.strokeStyle=`rgba(${r},${g},${b},${a*.4*pulse})`;
      X.lineWidth=2.5;X.beginPath();X.arc(x+domeR,y+domeR,domeR,0,6.28);X.stroke();
      // 水波光晕
      X.fillStyle=`rgba(186,230,253,${a*.1})`;
      X.beginPath();X.arc(x+domeR,y+domeR,domeR*1.15,0,6.28);X.fill();
      // 生命值条
      if(ef.hp<ef.mxhp){
        const barW=50,barH=4;
        X.fillStyle='rgba(0,0,0,.5)';X.fillRect(x+domeR-barW/2,y+domeR+domeR+10,barW,barH);
        X.fillStyle=hpRatio>.5?'#4ade80':hpRatio>.25?'#fbbf24':'#ef4444';
        X.fillRect(x+domeR-barW/2,y+domeR+domeR+10,barW*hpRatio,barH);
      }
    }
    // ─── 海神线烟(半透明渐变) ───
    if(ef.t==='harborTide'&&ef.hp>0&&ef.path&&ef.path.length>=2){
      const pth=ef.path,thick=ef.thick||10;
      const hpRatio=ef.hp/ef.mxhp;
      const r=Math.round(30+200*(1-hpRatio));
      const g=Math.round(180+60*hpRatio);
      const b=255;
      // 外发光层（宽、淡）
      X.strokeStyle=`rgba(${r},${g},${b},${a*.15})`;
      X.lineWidth=thick*4;
      X.lineCap='round';
      X.lineJoin='round';
      X.beginPath();
      X.moveTo(pth[0].x-cx,pth[0].y-cy);
      for(let pi=1;pi<pth.length;pi++)X.lineTo(pth[pi].x-cx,pth[pi].y-cy);
      X.stroke();
      // 主体层（半透明渐变）
      X.strokeStyle=`rgba(${r},${g},${b},${a*.5})`;
      X.lineWidth=thick;
      X.beginPath();
      X.moveTo(pth[0].x-cx,pth[0].y-cy);
      for(let pi=1;pi<pth.length;pi++)X.lineTo(pth[pi].x-cx,pth[pi].y-cy);
      X.stroke();
      // 内侧高光
      X.strokeStyle=`rgba(186,230,253,${a*.25})`;
      X.lineWidth=Math.max(2,thick*.3);
      X.beginPath();
      X.moveTo(pth[0].x-cx,pth[0].y-cy);
      for(let pi=1;pi<pth.length;pi++)X.lineTo(pth[pi].x-cx,pth[pi].y-cy);
      X.stroke();
      // 生命值条（路径起点上方）
      if(ef.hp<ef.mxhp){
        const barW=50,barH=4;
        const bx=pth[0].x-cx,by=pth[0].y-cy-thick/2-12;
        X.fillStyle='rgba(0,0,0,.5)';X.fillRect(bx-barW/2,by,barW,barH);
        X.fillStyle=hpRatio>.5?'#4ade80':hpRatio>.25?'#fbbf24':'#ef4444';
        X.fillRect(bx-barW/2,by,barW*hpRatio,barH);
      }
    }
    // ─── 海神水波推进轨迹 ───
    if(ef.t==='harborWave'){
      const waveLife=Math.min(1,1-(n-ef.s)/(ef.d));
      X.fillStyle=`rgba(6,182,212,${a*.2*waveLife})`;
      X.beginPath();X.arc(x,y,ef.r||30,0,6.28);X.fill();
      // 水波轨迹提示
      if(ef.trail){
        for(let ti=0;ti<ef.trail.length-1;ti++){
          const t=ef.trail[ti],t2=ef.trail[ti+1];
          X.strokeStyle=`rgba(56,189,248,${a*.15*(ti/ef.trail.length)})`;
          X.lineWidth=3;X.beginPath();X.moveTo(t.x-cx,t.y-cy);X.lineTo(t2.x-cx,t2.y-cy);X.stroke();
        }
      }
    }
    // ─── 海神大招 ───
    if(ef.t==='harborUlt'){
      const swirl=n/200+ef.x*.01;
      X.fillStyle=`rgba(6,182,212,${a*.08})`;
      X.beginPath();X.arc(x,y,ef.r||300,0,6.28);X.fill();
      X.strokeStyle=`rgba(56,189,248,${a*.25})`;
      X.lineWidth=2;X.beginPath();
      for(let i=0;i<20;i++){const t=i/20*6.28;X.lineTo(x+(ef.r||300)*.7*Math.cos(t+swirl),y+(ef.r||300)*.7*Math.sin(t+swirl))}
      X.stroke();
    }
    // ─── 壹决对决领域 ───
    if(ef.t==='isoArena'){
      X.strokeStyle=`rgba(251,191,36,${a*.4})`;
      X.lineWidth=3;X.setLineDash([8,8]);
      X.beginPath();X.arc(x,y,ef.r||200,0,6.28);X.stroke();
      X.setLineDash([]);
      X.fillStyle=`rgba(251,191,36,${a*.06})`;
      X.beginPath();X.arc(x,y,ef.r||200,0,6.28);X.fill();
      X.fillStyle=`rgba(254,243,199,${a*.4})`;X.font='10px sans-serif';X.textAlign='center';
      X.fillText('⚔️ 对决领域',x,y-8);
    }
    // ─── 彩雷飞溅 ───
    if(ef.t==='razeCluster'){
      const fuseLeft=Math.max(0,300-(n-ef.s))/300;
      X.fillStyle=`rgba(239,68,68,${fuseLeft})`;X.font='20px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('💣',x,y);
      // 分裂子雷预览
      if(fuseLeft>0.3)for(let i=0;i<4;i++){
        const sa=i/4*6.28+fuseLeft*2;
        X.fillStyle=`rgba(251,146,60,${fuseLeft*.4})`;X.font='12px sans-serif';
        X.fillText('💥',x+Math.cos(sa)*30,y+Math.sin(sa)*30);
      }
    }
    // ═══ 大招渲染：重力场 ═══
    if(ef.t==='gravity'){
      const r=ef.r||250;
      const swirl=n/150+ef.x*.01;
      X.fillStyle=`rgba(139,92,246,${a*.1})`;X.beginPath();X.arc(x,y,r,0,6.28);X.fill();
      X.strokeStyle=`rgba(167,139,250,${a*.4})`;X.lineWidth=2;X.beginPath();
      for(let i=0;i<24;i++){const t=i/24*6.28;const spiral=(.1+.9*i/24)*r;X.lineTo(x+Math.cos(t+swirl)*spiral,y+Math.sin(t+swirl)*spiral)}
      X.stroke();
      X.strokeStyle=`rgba(196,181,253,${a*.25})`;X.lineWidth=1.5;X.beginPath();
      for(let i=0;i<20;i++){const t=i/20*6.28;const spiral=(.1+.7*i/20)*r*.8;X.lineTo(x+Math.cos(-t+swirl*.7)*spiral,y+Math.sin(-t+swirl*.7)*spiral)}
      X.stroke();
      X.fillStyle='rgba(139,92,246,.5)';X.font='22px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('🌀',x,y);
    }
  });

  // ═══ 准备阶段屏障渲染 ═══
  if(G._prepWalls&&G.rnS==='prep'){
    for(const pw of G._prepWalls){
      const px=pw.x-cx,py=pw.y-cy,pw2=pw.w/2,ph2=pw.h/2;
      if(px<-80||px>W+80||py<-80||py>H+80)continue;
      // 实心填充
      X.fillStyle='rgba(251,191,36,.35)';X.fillRect(px,py,pw.w,pw.h);
      // 发光的边框
      X.shadowColor='rgba(251,191,36,.8)';X.shadowBlur=12;
      X.strokeStyle='#fbbf24';X.lineWidth=3;X.setLineDash([8,6]);X.strokeRect(px,py,pw.w,pw.h);X.setLineDash([]);
      X.shadowBlur=0;
      // 屏障图标（仅在较大的屏障上显示文字）
      if(pw.w>=40||pw.h>=40){
        X.fillStyle='rgba(251,191,36,.7)';X.font='bold 14px sans-serif';X.textAlign='center';X.textBaseline='middle';
        X.fillText('🛡️ 屏障',px+pw2,py+ph2);
      }else{
        X.fillStyle='rgba(251,191,36,.5)';X.font='16px sans-serif';X.textAlign='center';X.textBaseline='middle';
        X.fillText('⛔',px+pw2,py+ph2);
      }
    }
  }

  // 无人机渲染
  G.pr.forEach(pr=>{
    if(pr.t!=='drone')return;
    const x=pr.x-cx,y=pr.y-cy;
    if(x<-30||x>W+30||y<-30||y>H+30)return;
    const bobb=n/200+pr.x*.01;
    // 机体

    }

    X.font='9px sans-serif';X.textAlign='center';X.fillStyle='rgba(255,255,255,.6)';X.fillText(IC[p.tp]||'?',x,y-p.r-8);
    X.fillStyle=G.team==='atk'?'rgba(251,191,36,.6)':'rgba(59,130,246,.6)';X.font='bold 8px sans-serif';X.fillText(G.team==='atk'?'进攻':'防守',x,y+p.r+10);
    if(p._bomb){X.font='16px sans-serif';X.fillText('💣',x-10,y-p.r-24)}

    // 疾跑中准星变化
    if(p._sprint){
      X.strokeStyle='rgba(148,163,184,.4)';X.lineWidth=1.5;
      const ch=6,cg=6;
      X.beginPath();X.moveTo(ms.x-cg-ch,ms.y);X.lineTo(ms.x-cg,ms.y);X.stroke();
      X.beginPath();X.moveTo(ms.x+cg,ms.y);X.lineTo(ms.x+cg+ch,ms.y);X.stroke();
      X.beginPath();X.moveTo(ms.x,ms.y-cg-ch);X.lineTo(ms.x,ms.y-cg);X.stroke();
      X.beginPath();X.moveTo(ms.x,ms.y+cg);X.lineTo(ms.x,ms.y+cg+ch);X.stroke();
      // 疾跑提示
      X.fillStyle='rgba(96,165,250,.5)';X.font='bold 7px sans-serif';X.textAlign='center';
      X.fillText('🏃 疾跑',x,y+p.r+24);
    }else if(p._slide&&p._slide.active){
      // 滑铲准星
      X.strokeStyle='rgba(148,163,184,.3)';X.lineWidth=1;
      const ch=8,cg=8;
      X.beginPath();X.moveTo(ms.x-cg-ch,ms.y);X.lineTo(ms.x-cg,ms.y);X.stroke();
      X.beginPath();X.moveTo(ms.x+cg,ms.y);X.lineTo(ms.x+cg+ch,ms.y);X.stroke();
      X.beginPath();X.moveTo(ms.x,ms.y-cg-ch);X.lineTo(ms.x,ms.y-cg);X.stroke();
      X.beginPath();X.moveTo(ms.x,ms.y+cg);X.lineTo(ms.x,ms.y+cg+ch);X.stroke();
      // 滑铲提示
      X.fillStyle='rgba(56,189,248,.5)';X.font='bold 7px sans-serif';X.textAlign='center';
      X.fillText('💨 滑铲',x,y+p.r+24);
    }else{
      X.strokeStyle='#94a3b8';X.lineWidth=5;X.lineCap='round';
      X.beginPath();X.moveTo(x+Math.cos(p.ag)*5,y+Math.sin(p.ag)*5);X.lineTo(x+Math.cos(p.ag)*28,y+Math.sin(p.ag)*28);X.stroke();
      X.strokeStyle='rgba(255,255,255,.6)';X.lineWidth=1.5;
      const ch=8,cg=4;
      X.beginPath();X.moveTo(ms.x-cg-ch,ms.y);X.lineTo(ms.x-cg,ms.y);X.stroke();
      X.beginPath();X.moveTo(ms.x+cg,ms.y);X.lineTo(ms.x+cg+ch,ms.y);X.stroke();
      X.beginPath();X.moveTo(ms.x,ms.y-cg-ch);X.lineTo(ms.x,ms.y-cg);X.stroke();
      X.beginPath();X.moveTo(ms.x,ms.y+cg);X.lineTo(ms.x,ms.y+cg+ch);X.stroke();
    }
    // 体力条
    X.fillStyle='rgba(0,0,0,.4)';X.fillRect(x-26,y+p.r+30,52,4);

    X.fillStyle=stPct>.5?'#60a5fa':stPct>.25?'#fbbf24':'#ef4444';
    X.fillRect(x-26,y+p.r+30,52*stPct,4);

    if(p.rl){const g=GN[p.gi];X.fillStyle='rgba(0,0,0,.5)';X.fillRect(W/2-40,H-48,80,4);X.fillStyle='#f59e0b';X.fillRect(W/2-40,H-48,80*Math.min(1,(n-p.rs)/g.rl),4);X.fillStyle='#fbbf24';X.font='8px sans-serif';X.textAlign='center';X.fillText('换弹',W/2,H-40)}
  }

  // 粒子
  G.pt.forEach(pt=>{
    const a=pt.l/pt.mx,x=(pt.x||0)-cx,y=(pt.y||0)-cy;
    if(pt.isT){X.globalAlpha=a;X.fillStyle=pt.c||'#fff';X.font='bold 11px sans-serif';X.textAlign='center';X.fillText(pt.txt,x,y);X.globalAlpha=1}

  });

  // 击杀信息
  $('kf').innerHTML=G.kf.filter(f=>_-f.t<2500).map(f=>'<div class="kf">'+f.txt+'</div>').join('');

  // ═══ 小地图 ═══
  const mw=260/WW,mh=196/WH;
  MX.fillStyle='rgba(10,10,20,.9)';MX.fillRect(0,0,260,196);

  G.en.forEach(e=>{if(!e.al)return;MX.fillStyle='#ef4444';MX.beginPath();MX.arc(e.x*mw,e.y*mh,2,0,6.28);MX.fill()});
  if(G.pl&&G.pl.al){MX.fillStyle='#3b82f6';MX.beginPath();MX.arc(G.pl.x*mw,G.pl.y*mh,2.5,0,6.28);MX.fill()}

  if(G.bomb){MX.fillStyle='#ef4444';MX.beginPath();MX.arc(G.bomb.x*mw,G.bomb.y*mh,3,0,6.28);MX.fill()}
  MX.strokeStyle='rgba(255,255,255,.12)';MX.strokeRect(G.ca.x*mw,G.ca.y*mh,W*mw,H*mh);

  // ═══ 闪光致盲覆盖 ═══
  if(G.pl&&n<G.pl._blind){

    X.fillStyle=`rgba(255,255,255,${ba*.6})`;X.fillRect(0,0,W,H);
    X.fillStyle=`rgba(255,255,255,${ba*.15})`;X.font='bold 40px sans-serif';X.textAlign='center';X.fillText('✦',W/2+20*Math.sin(n*0.1),H/2-30);
    X.fillStyle=`rgba(255,255,255,${ba*.1})`;X.font='bold 30px sans-serif';X.fillText('✦',W/2-40*Math.sin(n*0.07+1),H/2+20);
  }

  // ═══ DEBUG: 游戏状态（冻结时观察）═══
  if(G._fc!==undefined){
    X.fillStyle='rgba(0,0,0,.5)';X.fillRect(4,4,130,42);
    X.fillStyle='#94a3b8';X.font='7px monospace';X.textAlign='left';
    X.fillText('RN:'+G.rnS+' R:'+G.rnd+' T:'+G.team,8,14);
    X.fillText('FR:'+G.fr.filter(f=>f.al).length+' EN:'+G.en.filter(e=>e.al).length+' PL:'+(G.pl.al?1:0),8,24);
    X.fillText('CH:'+(G.ch?1:0)+' BO:'+(G.bo?1:0)+' BF:'+(G.pl._bomb?1:0)+' AI💣:'+(G.fr.filter(f=>f._bomb).length+G.en.filter(e=>e._bomb).length),8,34);
    X.fillText('FC:'+G._fc,8,44);
  }
}

function uI(){
  const p=G.pl;
  if(G.spec){
    const ts=G._aiSpectate?[...G.fr,...G.en].filter(t=>t&&t.al):[G.pl,...G.fr].filter(t=>t&&t.al);
    const sel=$('specSelect');
    if(sel.options.length!==ts.length+1||sel._tsLen!==ts.length){
      sel.innerHTML='<option value="-1">—</option>'+ts.map((t,i)=>'<option value="'+i+'">'+(t.ip?'🎮 ':'')+IC[t.tp]+t.nm+' HP:'+Math.round(t.hp)+'</option>').join('');
      sel._tsLen=ts.length;
    }
    G.specIdx=Math.max(0,Math.min(G.specIdx||0,ts.length-1));
    sel.value=''+G.specIdx;
    const t=ts[G.specIdx];
    $('hudM').innerHTML='<span style="color:#fbbf24">👁 '+(t?IC[t.tp]+t.nm:'等待')+'</span> 🏆'+G.sc+' '+G.rnd+'/12';
    $('skUI').innerHTML='';$('wUI').innerHTML='';
    $('tmUI').innerHTML=G.fr.map(f=>f.al?'<div class="tm" style="border-color:'+f.c+'">'+IC[f.tp]+Math.round(f.hp)+'</div>':'<div class="tm" style="opacity:.3">💀</div>').join('');
    return;
  }
  if(!p)return;const g=GN[p.gi],n=_();
  const sprintIcon=p._sprint?' 🏃':'',slideIcon=(p._slide&&p._slide.active)?' 💨':'';
  const stPct=Math.round(p._stamina/p._staminaMax*100);
  const stColor=stPct>50?'#60a5fa':stPct>25?'#fbbf24':'#ef4444';
  var _rt='',_rw=0;if(G._roundEnd&&G.rnS!=='ended'&&G.rnS!=='menu'){var _r=Math.max(0,(G._roundEnd-_())/1000);var _rm=Math.floor(_r/60);var _rs=Math.floor(_r%60);_rt=('0'+_rm).slice(-1)+':'+('0'+_rs).slice(-2);if(_r<20&&_r>0)_rw=1;}
  const ultPct=Math.round(p._ult/p._ultMax*100);
  const ultColor=ultPct>=100?'#fbbf24':'#8b5cf6';
  const ultIcon=ultPct>=100?'⭐':'🔮';
  $('hudM').innerHTML='<span style="color:'+(p.hp/p.mx>.5?'#4ade80':p.hp/p.mx>.25?'#fbbf24':'#ef4444')+'">❤️'+Math.round(p.hp)+'</span> <span>🔫'+g.n+'['+p.am+'/'+g.m+']</span>'+(p._bomb?' 💣':'')+(sprintIcon||slideIcon)+' <span style="color:'+stColor+'">⚡'+stPct+'%</span> '+(G.rnS==='prep'?'⏳'+Math.max(0,(G._prepEnd-_())/1000).toFixed(0)+'s':_rt?'<span style="color:'+(_rw?'#ef4444':'#fbbf24')+'">⏱</span>'+_rt:'')+' <span style="color:'+ultColor+'">'+ultIcon+ultPct+'%</span> 🏆'+G.sc+' '+G.rnd+'/12 '+(G.team==='atk'?'🔵进攻':'🔴防守');
  $('skUI').innerHTML=p.sk.map((s,i)=>{const r=n>=s.ce;return'<div class="sk '+(r?'rd':'cd')+'">'+s.i+s.n+'<span class="k">['+['Q','E','C'][i]+']'+(r?'':' '+(s.ce-n)/1000|0+'s')+'</span></div>'}).join('');
  $('wUI').innerHTML=GN.map((g,i)=>'<div class="w '+(i===p.gi?'cur':'')+'"><span class="k">['+(i+1)+']</span>'+g.n+'</div>').join('');
  $('tmUI').innerHTML=G.fr.map(f=>f.al?'<div class="tm" style="border-color:'+f.c+'">'+IC[f.tp]+Math.round(f.hp)+'</div>':'<div class="tm" style="opacity:.3">💀</div>').join('');
  var _u=p._ult;_u=_u>p._ultMax?p._ultMax:_u;var _up=_u/p._ultMax*100|0;$('ultUI').innerHTML='<div class="sk "'+(_up>=100?'rd':'cd')+'">'+UL[p.tp].i+(UL[p.tp].n||'??')+'<span class="k">'+(_up>=100?'[V]':' '+(100-_up)+'%')+'</span></div>';
}

function startGame(tp,skills){
  $ld('生成干员...',50);
  G.st='playing';G.rnd=1;G.team='atk';G.sc=0;G.kf=[];G.spec=0;G.specIdx=-1;
  G.pl=mkE(tp||'phoenix',SP_ATK[0].x,SP_ATK[0].y,1,'fr');
  // 使用英雄预设技能（覆盖mkE中的默认技能）
  G.pl.sk=AG[tp||'phoenix'].sk.map(s=>({...s,ce:0}));
  G.pl.gi=2;G.pl.am=GN[2].m;
  G.fr=[];G.en=[];

  const AG_KEYS=Object.keys(AG);
  const ft=AG_KEYS.filter(t=>t!==tp);
  SP_ATK.forEach((sp,i)=>{
    if(i===0)return;
    const f=mkE(ft[(i-1)%ft.length],sp.x,sp.y,0,'fr');
    f.gi=Math.random()*6|0;f.am=GN[f.gi].m;
    f.sk=AG[ft[(i-1)%ft.length]].sk.map(s=>({...s,ce:0}));
    G.fr.push(f);
  });
  SP_DEF.forEach((sp,i)=>{
    const e=mkE(AG_KEYS[i%AG_KEYS.length],sp.x,sp.y,0,'en');
    e.gi=i===0?4:i===1?3:i===2?2:i===3?1:5;e.am=GN[e.gi].m;
    e.sk=AG[AG_KEYS[i%AG_KEYS.length]].sk.map(s=>({...s,ce:0}));
    G.en.push(e);
  });

  $('loading').classList.add('hide');
  $('mapSel').style.display='none';
  $ld('开始游戏!',100);
  $('st').classList.remove('show');$('ct').classList.remove('show');
  $('sel').classList.remove('show');$('specUI').classList.remove('show');
  sR();uI();
}

// ═══ AI观战模式（复用startGame逻辑）═══
function startAISpectate(){
  G._aiSpectate=true;
  startGame('phoenix');
  // 立即杀死玩家进入观战
  if(G.pl){G.pl.al=0;G.pl.hp=0}
  // 补一个进攻方AI达成5v5（用玩家位置）
  const extraAI=mkE('phoenix',G.pl.x,G.pl.y,0,'fr');
  extraAI.gi=2;extraAI.am=GN[2].m;
  G.fr.push(extraAI);
  // 指定一个AI捡炸弹
  const bombCarrier=G.fr.find(f=>f.al);
  if(bombCarrier){bombCarrier._bomb=1;G.bo=null}
  G.spec=1;G.specIdx=0;$('specSelect').onchange=()=>{G.specIdx=parseInt($('specSelect').value)||0};
  // 隐藏选人UI，显示观战UI
  $('sel').classList.remove('show');
  $('specUI').classList.add('show');
  uI();
  lp(0);
}

// 英雄列表（按用户指定顺序）
const AGENTS_ORDER=['phoenix','jett','astra','harbor','sage','sova','reyna','clove','chamber','omen','raze','neon','iso'];
const AGENTS_CN={phoenix:'幻棱',jett:'捷风',astra:'星礈',harbor:'海神',sage:'贤者',sova:'猎枭',reyna:'瑞纳',clove:'暮蝶',chamber:'尚伯乐',omen:'幽影',raze:'雷兹',neon:'霓虹',iso:'壹决'};

function showAgentPick(){
  G.st='menu';
  $('mapSel').style.display='flex';
  $('sel').innerHTML=AGENTS_ORDER.map(k=>{
    const v=AG[k];
    return '<div class="ag" data-a="'+k+'"><span class="an" style="color:'+v.c+'">'+v.sk[0].i+v.sk[1].i+v.sk[2].i+'</span>'+AGENTS_CN[k]+'<sub style="display:block;font-size:7px;color:#64748b;margin-top:2px">HP:'+v.hp+' SPD:'+v.sp.toFixed(1)+'</sub></div>';
  }).join('');
  $('sel').classList.add('show');$('ct').classList.remove('show');
  $('st').innerHTML='选英雄<sub>点击选择 · Q/E/C使用技能 · Shift疾跑+回车滑铲 · [V]大招</sub>';
  $('st').classList.add('show');
  $('sel').querySelectorAll('.ag').forEach(el=>{
    el.onclick=()=>{
      $('sel').classList.remove('show');$('st').classList.remove('show');
      startGame(el.dataset.a);
      lp(0);
    }
  });
}

$('btnSt').onclick=showAgentPick;

// ═══ 主循环 ═══════════════
let lt=0;
function lp(t){
  if(!window._lpC)window._lpC=0;window._lpC++;
  const dt=Math.min(t-lt,33);lt=t;
  try{up(dt)}catch(e){console.error('up:',e)}
  try{rd()}catch(e){console.error('rd:',e)}
  requestAnimationFrame(lp);
}

// 初始化完成 → 隐藏加载 → 显示选人界面
$('loading').classList.add('hide');
$ld('就绪',100);
setTimeout(()=>{
  // 地图选择
  $('mapSel').style.display='flex';
  $('ct').classList.add('show');
  var _mu=function(){var m=$('mapFrac'),c=$('mapCany');m.style.borderColor=G._mapName==='canyon'?'#444':'#fbbf24';c.style.borderColor=G._mapName==='canyon'?'#fbbf24':'#444'};
  $('mapFrac').onclick=function(){if(G._mapName==='fracture')return;loadMap('fracture');G._mapName='fracture';_mu()};
  $('mapCany').onclick=function(){if(G._mapName==='canyon')return;loadMap('canyon');G._mapName='canyon';_mu()};$('btnSpec').onclick=function(){startAISpectate()};
  _mu();
  try{
    showAgentPick();
  }catch(e){console.error('init err:',e);try{document.getElementById('loading').innerHTML='<span style=color:red>ERR:</span> '+e.message.slice(0,200)}catch(x){}}
},100);
