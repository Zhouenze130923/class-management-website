<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班级呼叫 · 大屏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0a0e17;color:#e0e6f0;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none}
.screen{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}

/* 绑定 */
.bind{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0e17;z-index:10}
.bind.hidden{display:none}
.bind-box{text-align:center;max-width:420px;width:90%}
.bind-box .icon{font-size:2.5rem;margin-bottom:.3rem}
.bind-box h2{font-size:1.1rem;font-weight:700;color:#a78bfa;margin-bottom:.2rem}
.bind-box p{color:#6b7280;font-size:.75rem;margin-bottom:.8rem}
.bind-box .bi-row{display:flex;gap:.4rem;margin-bottom:.4rem}
.bind-box .bi-row input{flex:1;padding:.5rem .6rem;border-radius:10px;border:1.5px solid #1e2a3a;background:#0d1520;color:#e0e6f0;font-size:1rem;outline:none;text-align:center;letter-spacing:4px;font-family:monospace;text-transform:uppercase}
.bind-box .bi-row input:focus{border-color:#a78bfa}
.bind-box .bi-row button{padding:.5rem .8rem;border-radius:10px;border:none;background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;font-weight:700;cursor:pointer;font-size:.8rem}
.bind-box .bi-list{background:#141b2d;border:1px solid #1e2a3a;border-radius:12px;padding:.4rem;margin-bottom:.5rem;text-align:left}
.bind-box .bi-item{display:flex;align-items:center;gap:.4rem;padding:.25rem .4rem;border-bottom:1px solid #1e2a3a;font-size:.7rem}
.bind-box .bi-item:last-child{border-bottom:none}
.bind-box .bi-item .bi-code{flex:1;font-family:monospace;color:#a78bfa}
.bind-box .bi-item button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.55rem}
.bind-box .err{color:#ef4444;font-size:.75rem;min-height:1rem}
.bind-box .done-btn{width:100%;padding:.5rem;border-radius:10px;border:1px solid #27ae60;background:transparent;color:#27ae60;font-weight:700;cursor:pointer;font-size:.8rem}

/* 大屏 */
.ds{text-align:center}
.ds-class{font-size:.9rem;color:#6b7280;margin-bottom:.3rem;min-height:1.3rem}
.ds-status{font-size:1rem;color:#6b7280;margin-bottom:.3rem}
.ds-sub{font-size:4rem;font-weight:700;color:#c4b5fd;letter-spacing:6px;display:none;margin-bottom:.1rem;animation:pulse .6s ease-in-out infinite}
.ds-name{font-size:8rem;font-weight:800;color:#a78bfa;letter-spacing:8px;line-height:1.2;min-height:10rem;display:none;animation:pulse .6s ease-in-out infinite}
.ds-info{font-size:.85rem;color:#6b7280;display:none;margin-top:.2rem}
.ds-hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:#6b7280;font-size:.55rem;opacity:.25;text-align:center;width:90%;line-height:1.6}
.ds-hint a{color:#6b7280}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.85}}
@media(max-width:600px){.ds-name{font-size:4rem;min-height:5rem;letter-spacing:4px}.ds-sub{font-size:2.5rem}}
</style>
</head>
<body>
<div class="bind" id="bindScreen">
<div class="bind-box">
<div class="icon">📞</div>
<h2>绑定教师</h2>
<p>输入教师码，可绑定多个教师</p>
<div class="bi-row">
<input type="text" id="codeInput" placeholder="教师码" maxlength="12" autofocus>
<button id="addCodeBtn" onclick="globalAddCode()">添加</button>
</div>
<div class="bi-list" id="codeList"></div>
<div class="err" id="bindErr"></div>
<button class="done-btn" id="doneBtn">✅ 完成，进入大屏</button>
</div>
</div>
<div class="screen" id="dsScreen">
<div class="ds-class" id="dsClass"></div>
<div class="ds-status" id="dsStatus">等待呼叫…</div>
<div class="ds-sub" id="dsSub"></div>
<div class="ds-name" id="dsName">—</div>
<div class="ds-info" id="dsInfo"></div>
<button id="addMoreBtn" style="position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:#1a1040;border:2px solid #a78bfa;color:#a78bfa;padding:6px 20px;border-radius:20px;cursor:pointer;font-size:14px;font-weight:700;z-index:5;display:none;box-shadow:0 0 20px rgba(167,139,250,.3)">➕ 添加教师</button>
<div style="position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:#141b2d;border:1px solid #1e2a3a;border-radius:10px;padding:6px;display:none;gap:4px;z-index:5" id="addInlineRow">
<input type="text" id="addInlineInput" placeholder="教师码" maxlength="12" style="padding:4px 8px;border-radius:6px;border:1px solid #1e2a3a;background:#0d1520;color:#e0e6f0;font-size:12px;outline:none;width:120px;font-family:monospace;text-transform:uppercase">
<button id="addInlineBtn" style="padding:4px 10px;border-radius:6px;border:none;background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;font-weight:700;font-size:11px;cursor:pointer">添加</button>
<button id="addInlineCancel" style="padding:4px 8px;border-radius:6px;border:1px solid #1e2a3a;background:transparent;color:#6b7280;font-size:11px;cursor:pointer">✕</button>
</div>
<div class="ds-hint" id="dsHint"></div>
</div>
<script>
// 全局函数供内联onclick调用
function globalAddCode(){
  var inp = document.getElementById('codeInput');
  if(!inp) return;
  var v = inp.value.trim().toUpperCase();
  var err = document.getElementById('bindErr');
  var list = document.getElementById('codeList');
  if(!v||v.length<4){ if(err)err.textContent='❌ 无效的教师码'; return; }
  var raw = localStorage.getItem('***') || '[]';
  try{ var codes = JSON.parse(raw); if(!Array.isArray(codes)) codes=[]; }catch(e){ codes=[]; }
  if(codes.indexOf(v)>=0){ if(err)err.textContent='⚠️ 已绑定此码'; return; }
  codes.push(v);
  localStorage.setItem('***', JSON.stringify(codes));
  inp.value=''; if(err)err.textContent='';
  // 更新列表显示（先清空再刷新页面读取最新数据）
  var listEl = document.getElementById('codeList');
  if(listEl){
    var h='';
    codes.forEach(function(c){h+='<div class="bi-item"><span class="bi-code">'+c+'</span></div>';});
    listEl.innerHTML=h;
  }
}
(function(){
'use strict';
console.log('大屏脚本已加载');
var API = '/api/call';
var BIND_KEY = '***';
var boundCodes = JSON.parse(localStorage.getItem(BIND_KEY)||'[]');
if(!Array.isArray(boundCodes)) boundCodes = [];

// 强制重新绑定
if(window.location.search.indexOf('rebind=1')>=0){ boundCodes=[]; localStorage.setItem(BIND_KEY,JSON.stringify(boundCodes)); }

function fmt(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);}

// ===== 绑定界面 =====
var bindScreen=document.getElementById('bindScreen');
var codeInput=document.getElementById('codeInput');
var codeList=document.getElementById('codeList');
var bindErr=document.getElementById('bindErr');

function renderCodeList(){
  var h='';
  if(!boundCodes.length) h='<div style="color:#6b7280;text-align:center;font-size:.7rem;padding:.3rem">暂无绑定</div>';
  else boundCodes.forEach(function(c){
    h+='<div class="bi-item"><span class="bi-code">'+c+'</span><button data-code="'+c+'">✕ 删除</button></div>';
  });
  codeList.innerHTML=h;
  codeList.querySelectorAll('[data-code]').forEach(function(btn){
    btn.addEventListener('click',function(){
      boundCodes=boundCodes.filter(function(c){return c!==this.getAttribute('data-code');}.bind(this));
      localStorage.setItem(BIND_KEY,JSON.stringify(boundCodes));renderCodeList();
    });
  });
}

document.getElementById('addCodeBtn').addEventListener('click',function(){
  var v=codeInput.value.trim().toUpperCase();
  if(!v||v.length<4){bindErr.textContent='❌ 无效的教师码';return;}
  if(boundCodes.indexOf(v)>=0){bindErr.textContent='⚠️ 已绑定此码';return;}
  boundCodes.push(v);localStorage.setItem(BIND_KEY,JSON.stringify(boundCodes));
  codeInput.value='';bindErr.textContent='';renderCodeList();codeInput.focus();
});
codeInput.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('addCodeBtn').click();});

document.getElementById('doneBtn').addEventListener('click',function(){
  var raw=localStorage.getItem('***')||'[]';
  try{var all=JSON.parse(raw);if(!Array.isArray(all))all=[];}catch(e){all=[];}
  if(!all.length){bindErr.textContent='请至少绑定一个教师码';return;}
  boundCodes=all;
  localStorage.setItem(BIND_KEY,JSON.stringify(boundCodes));
  bindScreen.classList.add('hidden');
  dsHint.innerHTML='已绑定 '+boundCodes.length+' 个教师 · <a href="?rebind=1" style="color:#6b7280;text-decoration:underline">管理绑定</a>';
  startPolling();
});

// ===== 大屏 =====
var dsClass=document.getElementById('dsClass'), dsStatus=document.getElementById('dsStatus'), dsSub=document.getElementById('dsSub'), dsName=document.getElementById('dsName'), dsInfo=document.getElementById('dsInfo'), dsHint=document.getElementById('dsHint');
var lastCallKey = '';
var speechId = 0;

var showing=false;
function showCall(data,code){
  if(showing) return;
  if(!data||!data.name) return;
  var key=data.name+(data.className||'')+(data.teacherName||'')+code;
  if(key===lastCallKey) return;
  lastCallKey=key; showing=true;
  setTimeout(function(){showing=false;},15000);
  
  var cl=data.className?(data.className+' · '):'';
  var tn=data.teacherName?data.teacherName:'教师';
  dsClass.textContent=cl+tn;
  dsSub.textContent=data.name+'同学'; dsSub.style.display='block';
  dsName.textContent='请到'+tn+'办公室'; dsName.style.display='block';
  dsStatus.textContent='📞 呼叫中';
  dsInfo.textContent=fmt(); dsInfo.style.display='block';
  
  // TTS - 使用speechId防止旧会话干扰
  if(window.speechSynthesis){
    speechId = Date.now();
    var sid = speechId;
    var text=data.name+'同学请到'+tn+'办公室';
    var cnt=0;
    function doSpk(){
      if(cnt>=10 || sid!==speechId) return;
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.lang='zh-CN'; u.rate=1.0; u.volume=1.0;
        var vs=window.speechSynthesis.getVoices();
        var zh=vs.find(function(v){return v.lang.startsWith('zh');});
        if(zh) u.voice=zh;
        u.onend=function(){cnt++;setTimeout(function(){if(sid===speechId)doSpk();},200);};
        u.onerror=function(){cnt++;setTimeout(function(){if(sid===speechId)doSpk();},300);};
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      }catch(e){cnt++;setTimeout(function(){if(sid===speechId)doSpk();},300);}
    }
    if(window.speechSynthesis.getVoices().length) doSpk();
    else{window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.onvoiceschanged=null;doSpk();};}
  }
}

function clearDisplay(){
  if(showing) return;
  lastCallKey=''; speechId=0; dsSub.style.display='none'; dsName.style.display='none'; dsInfo.style.display='none';
  dsStatus.textContent='等待呼叫…'; dsClass.textContent='';
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

// 轮询（顺序执行，不并发）
var polling=false;
var hasCall=false;
function pollOnce(){
  if(!boundCodes.length||polling) return;
  polling=true; hasCall=false;
  var idx=0;
  function nextCode(){
    if(idx>=boundCodes.length){
      polling=false;
      if(!hasCall) clearDisplay();
      return;
    }
    fetch(API+'?room='+encodeURIComponent(boundCodes[idx]))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.name){hasCall=true;showCall(d,boundCodes[idx]);}
        // 不清空，等到所有码都查完再说
      }).catch(function(){})
      .then(function(){idx++;nextCode();});
  }
  nextCode();
}
function startPolling(){
  pollOnce();
  setInterval(pollOnce,3000);
}

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
}

// 大屏端添加教师
var addMoreBtn=document.getElementById('addMoreBtn');
var addInlineRow=document.getElementById('addInlineRow');
var addInlineInput=document.getElementById('addInlineInput');
var addInlineBtn=document.getElementById('addInlineBtn');
var addInlineCancel=document.getElementById('addInlineCancel');

addMoreBtn.addEventListener('click',function(){
  addInlineRow.style.display='flex';
  addMoreBtn.style.display='none';
  addInlineInput.focus();
});
addInlineCancel.addEventListener('click',function(){
  addInlineRow.style.display='none';
  addMoreBtn.style.display='block';
});
addInlineBtn.addEventListener('click',function(){
  var v=addInlineInput.value.trim().toUpperCase();
  if(!v||v.length<4) return;
  var raw=localStorage.getItem('***')||'[]';
  try{var all=JSON.parse(raw);if(!Array.isArray(all))all=[];}catch(e){all=[];}
  if(all.indexOf(v)>=0){addInlineInput.value='';return;}
  all.push(v);
  localStorage.setItem('***',JSON.stringify(all));
  boundCodes=all;
  localStorage.setItem(BIND_KEY,JSON.stringify(boundCodes));
  addInlineInput.value='';
  addInlineRow.style.display='none';
  addMoreBtn.style.display='block';
  dsHint.innerHTML='已绑定 '+boundCodes.length+' 个教师 · <a href="?rebind=1" style="color:#6b7280;text-decoration:underline">管理绑定</a>';
});
addInlineInput.addEventListener('keydown',function(e){
  if(e.key==='Enter') addInlineBtn.click();
});

// 显示添加按钮
if(boundCodes.length) addMoreBtn.style.display='block';

// ===== 启动 =====
if(boundCodes.length){
  bindScreen.classList.add('hidden');
  dsHint.innerHTML='已绑定 '+boundCodes.length+' 个教师 · <a href="?rebind=1" style="color:#6b7280;text-decoration:underline">管理绑定</a>';
  startPolling();
}
// 暴露到全局
window.addCode = document.getElementById('addCodeBtn').onclick;
})();
</script>
</body>
</html>
